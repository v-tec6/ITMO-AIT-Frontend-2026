<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Контрамарка — Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="index.html">
      <span class="badge brand-badge text-white">КМ</span>
      Контрамарка
    </a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="login.html">Вход</a>
      <a class="btn btn-primary active" href="register.html">Регистрация</a>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-8 col-lg-6">
        <div class="border rounded-4 p-4 p-lg-5">
          <h1 class="h4 fw-semibold mb-1">Регистрация</h1>
          <p class="text-secondary mb-4">Создайте аккаунт, чтобы покупать билеты и хранить их в одном месте.</p>

          <form id="registerForm" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Имя</label>
                <input class="form-control" name="firstName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Фамилия</label>
                <input class="form-control" name="lastName" required>
              </div>
              <div class="col-12">
                <label class="form-label">Эл. почта</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Пароль</label>
                <input type="password" class="form-control" name="password" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Повтор пароля</label>
                <input type="password" class="form-control" name="confirmPassword" required>
              </div>
              <div class="col-12">
                <div class="alert alert-danger d-none mb-0" id="registerError" role="alert"></div>
              </div>
              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="terms" required>
                  <label class="form-check-label">
                    Я согласен с условиями сервиса
                  </label>
                </div>
              </div>
            </div>

            <button class="btn btn-primary w-100 mt-4" id="registerSubmit" type="submit">
              Создать аккаунт
            </button>

            <div class="text-secondary small mt-3">
              Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth-service.js"></script>
<script src="assets/js/register-page.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
