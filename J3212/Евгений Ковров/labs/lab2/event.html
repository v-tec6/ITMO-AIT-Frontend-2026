<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Контрамарка — Мероприятие</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="index.html">
      <span class="badge brand-badge text-white">КМ</span>
      Контрамарка
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="topNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">События</a></li>
        <li class="nav-item"><a class="nav-link" href="organizer.html">Организатору</a></li>
      </ul>

      <div class="d-flex gap-2 align-items-center" data-auth-nav></div>
    </div>
  </div>
</nav>

<main class="py-4 border-bottom">
  <div class="container" id="eventDetailsPage">
    <div class="border rounded-4 p-4 text-center text-secondary">
      Загрузка мероприятия...
    </div>
  </div>
</main>

<div class="modal fade" id="buyModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header">
        <h5 class="modal-title">Покупка билета</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="text-secondary">Мероприятие:</div>
        <div class="fw-semibold" id="buyEventName">—</div>
        <hr>
        <label class="form-label">Количество</label>
        <select class="form-select">
          <option selected>1</option><option>2</option><option>3</option><option>4</option>
        </select>
        <div class="form-text">После подтверждения откроется выбор способа оплаты.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
        <button class="btn btn-primary" id="buyConfirmButton">Подтвердить покупку</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="shareModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header">
        <h5 class="modal-title">Поделиться</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label">Ссылка</label>
        <input class="form-control" id="shareEventLink" value="https://Контрамарка.local/events" readonly>
        <div class="form-text">Можно отправить другу или сохранить для себя.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Закрыть</button>
        <button class="btn btn-primary" type="button">Скопировать</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header">
        <h5 class="modal-title">Отзыв</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label">Оценка</label>
        <select class="form-select mb-3">
          <option selected>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
        </select>
        <label class="form-label">Текст</label>
        <textarea class="form-control" rows="4" placeholder="Коротко и по делу..."></textarea>
        <div class="form-text">Отзыв появится на странице после модерации.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
        <button class="btn btn-primary" data-bs-dismiss="modal">Опубликовать</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth-service.js"></script>
<script src="assets/js/auth-ui.js"></script>
<script src="assets/js/events-service.js"></script>
<script src="assets/js/orders-service.js"></script>
<script src="assets/js/event-page.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
