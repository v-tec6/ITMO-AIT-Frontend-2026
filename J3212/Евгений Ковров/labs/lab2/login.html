<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Контрамарка — Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="index.html">
      <span class="badge brand-badge text-white">КМ</span>
      Контрамарка
    </a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary active" href="login.html">Вход</a>
      <a class="btn btn-primary" href="register.html">Регистрация</a>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-7 col-lg-5">
        <div class="border rounded-4 p-4 p-lg-5">
          <h1 class="h4 fw-semibold mb-1">Вход</h1>
          <p class="text-secondary mb-4">Войдите, чтобы управлять покупками и возвратами.</p>

          <form>
            <label class="form-label">Эл. почта</label>
            <input type="email" class="form-control mb-3" required>

            <label class="form-label">Пароль</label>
            <input type="password" class="form-control mb-3" required>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label" for="rememberMe">Запомнить меня</label>
            </div>

            <button class="btn btn-primary w-100" type="button" onclick="location.href='profile.html'">
              Войти
            </button>

            <div class="text-secondary small mt-3">
              Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
