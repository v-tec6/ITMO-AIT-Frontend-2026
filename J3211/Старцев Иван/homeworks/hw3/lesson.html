<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Обучение</title>
    <script src="js/theme.js"></script>
    <meta id="metaDescription" name="description" content="Содержание уроков курса">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="my-learning">
<header class="sticky-top" data-app-header></header>
<main class="container-fluid pt-2 pb-3">
    <div class="row g-3">
        <aside class="d-none d-lg-block col-lg-4 col-xl-3">
            <div class="card sticky-top z-0 overflow-auto lesson-page__sidebar">
                <div class="card-header sticky-top d-flex justify-content-between align-items-baseline bg-light">
                    <h2 class="h6">Программа курса</h2>
                    <a href="course.html" data-back-to-course-link class="btn btn-outline-dark btn-sm">
                        <i class="bi bi-arrow-left" aria-hidden="true"></i> Назад
                    </a>
                </div>
                <div id="lessonsNav"></div>
            </div>
        </aside>

        <section class="col-12 col-lg-8 col-xl-9">
            <div class="card">
                <div class="card-body">
                    <div class="d-lg-none mb-3">
                        <button type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal"
                                data-bs-target="#lessonsModal">
                            <i class="bi bi-list-ul" aria-hidden="true"></i>
                            <span class="ms-1">Выбрать урок</span>
                        </button>
                    </div>
                    <p class="text-muted mb-1" id="contentCourseTitle"></p>
                    <h1 class="h4 mb-2" id="contentLessonTitle"></h1>
                    <p class="text-muted mb-4" id="contentSectionTitle"></p>

                    <h2 class="h6">Материал</h2>
                    <p id="contentText" class="mb-3"></p>
                </div>
            </div>
        </section>
    </div>
</main>

<div class="modal fade" id="lessonsModal" tabindex="-1" aria-labelledby="lessonsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5" id="lessonsModalLabel">Программа курса</h2>
                <div class="ms-auto">
                    <a href="course.html" data-back-to-course-link class="btn btn-outline-dark btn-sm">
                        <i class="bi bi-arrow-left" aria-hidden="true"></i> Назад
                    </a>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <div id="lessonsNavMobile"></div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="node_modules/axios/dist/axios.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/header.js"></script>
<script src="js/lesson-page.js"></script>
</body>
</html>
