<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Профиль пользователя.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="sticky-top" data-app-header></header>

<main class="py-4">
    <div class="container">
        <div id="profileAlert" class="alert d-none" role="alert"></div>
        <div class="row g-4">
            <div class="col-12 col-lg-8">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                            <div>
                                <h1 class="h3 mb-1">Профиль</h1>
                                <p class="text-muted mb-0">Основная информация пользователя</p>
                            </div>
                            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                                Изменить данные
                            </button>
                        </div>

                        <div class="row g-4">
                            <div class="col-12">
                                <img id="profileAvatar" class="rounded-circle object-fit-cover" width="96" height="96" alt="" src="">
                            </div>
                            <div class="col-12 col-md-6">
                                <p class="small mb-1">Имя</p>
                                <p class="fs-5 fw-bold mb-0" id="profileName"></p>
                            </div>
                            <div class="col-12 col-md-6">
                                <p class="small mb-1">Email</p>
                                <p class="fs-5 fw-bold mb-0" id="profileEmail"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="row g-4">
                    <div class="col-12">
                        <div class="card border-0 shadow-lg rounded-4">
                            <div class="card-body p-4">
                                <p class="text-muted mb-2">Курсы в обучении</p>
                                <p class="display-6 fw-bold mb-2" id="learningCount">0</p>
                                <a href="my-learning.html" class="btn btn-sm btn-outline-primary">Моё обучение</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="card border-0 shadow-lg rounded-4">
                            <div class="card-body p-4">
                                <p class="text-muted mb-2">Создано курсов</p>
                                <p class="display-6 fw-bold mb-2" id="createdCount">0</p>
                                <a href="my-courses.html" class="btn btn-sm btn-outline-success">Мои курсы</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5" id="editProfileModalLabel">Изменить данные</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editProfileForm">
                    <div class="mb-3">
                        <label for="editName" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="editName" name="name" placeholder="Ivan" required>
                    </div>
                    <div class="mb-3">
                        <label for="editEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="editEmail" name="email" placeholder="email@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="editAvatar" class="form-label">Ссылка на аватар</label>
                        <input type="url" class="form-control" id="editAvatar" name="avatar" placeholder="https://example.com/avatar.jpg" required>
                    </div>
                    <div class="mb-0">
                        <label for="editPassword" class="form-label">Новый пароль</label>
                        <input type="password" class="form-control" id="editPassword" name="password" placeholder="Введите новый пароль">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-primary" id="saveProfileBtn" data-bs-dismiss="modal" form="editProfileForm">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="node_modules/axios/dist/axios.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/header.js"></script>
<script src="js/profile-page.js"></script>
</body>
</html>
