<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Моё обучение</title>
    <meta name="description" content="Ваши активные курсы.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="my-learning">
<header class="sticky-top" data-app-header></header>

<main class="container pt-2 pb-4">
    <h1 class="h3 mb-3">Моё обучение</h1>

    <form id="searchForm" class="input-group mb-3">
        <input id="searchInput" type="text" class="form-control" placeholder="Введите название курса">
        <button class="btn btn-primary" type="submit">
            <i class="bi bi-search"></i> Искать
        </button>
    </form>

    <div id="emptyState" class="alert alert-secondary d-none" role="alert">
        Курсы не найдены.
    </div>

    <div id="learningCoursesContainer" class="row g-3"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="node_modules/axios/dist/axios.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/header.js"></script>
<script src="js/my-learning-page.js"></script>
</body>
</html>
