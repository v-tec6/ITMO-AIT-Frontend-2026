<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <meta name="description" content="Создайте аккаунт чтобы получить доступ к курсам и личному кабинету.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark">
<header class="sticky-top" data-app-header></header>
<main class="container d-flex justify-content-center align-items-center py-5">
    <div class="card p-4 rounded-4" style="max-width: 460px; width: 100%;">
        <p class="text-center mb-3"><b>Регистрация</b></p>
        <div id="registerAlert" class="alert d-none" role="alert"></div>
        <form id="registerForm">
            <div class="mb-3">
                <label for="InputName" class="form-label">Имя</label>
                <input type="text" class="form-control" id="InputName" name="name" required>
            </div>
            <div class="mb-3">
                <label for="InputEmail" class="form-label">Адрес</label>
                <input type="email" class="form-control" id="InputEmail" name="email" required>
            </div>
            <div class="mb-3">
                <label for="InputPassword" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="InputPassword" name="password" required>
            </div>
            <div class="d-flex justify-content-center mb-3">
                <button type="submit" class="btn btn-primary w-75">Зарегистрироваться</button>
            </div>
            <p class="text-center mt-3 mb-0">
                Есть аккаунт?
                <a href="login.html" class="link-primary">Войти</a>
            </p>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="node_modules/axios/dist/axios.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/header.js"></script>
<script src="js/register-page.js"></script>
</body>
</html>
