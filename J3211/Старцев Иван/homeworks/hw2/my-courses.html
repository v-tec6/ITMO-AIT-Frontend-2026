<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Мои курсы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="my-courses">
<header class="sticky-top" data-app-header></header>

<main class="container pt-2 pb-4">
    <div id="myCoursesAlert" class="alert d-none" role="alert"></div>
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h1 class="h3 mb-0">Мои курсы</h1>
        <button id="openCreateCourseModalBtn" type="button" class="btn btn-primary" data-bs-toggle="modal"
                data-bs-target="#courseModal">
            <i class="bi bi-plus-circle"></i> Создать курс
        </button>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-12 col-md-4">
            <div class="card">
                <div class="card-body">
                    <p class="text-muted mb-1">Создано курсов</p>
                    <p class="h3 mb-0" id="statCoursesCount">0</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="card">
                <div class="card-body">
                    <p class="text-muted mb-1">Учеников на курсах</p>
                    <p class="h3 mb-0" id="statStudentsCount">0</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="card">
                <div class="card-body">
                    <p class="text-muted mb-1">Выручка</p>
                    <p class="h3 mb-0" id="statRevenue">0 ₽</p>
                </div>
            </div>
        </div>
    </div>

    <div id="emptyState" class="alert alert-secondary d-none">
        Пока нет созданных курсов.
    </div>
    <div id="createdCoursesContainer" class="row g-3"></div>
</main>

<div class="modal fade" id="courseModal" tabindex="-1" aria-labelledby="courseModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5" id="courseModalLabel">Создать курс</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <form id="courseForm">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="courseTitleInput" class="form-label">Название</label>
                            <input id="courseTitleInput" type="text" class="form-control" required>
                        </div>

                        <div class="col-12">
                            <label for="courseDescriptionInput" class="form-label">Краткое описание</label>
                            <textarea id="courseDescriptionInput" class="form-control" rows="2" required></textarea>
                        </div>

                        <div class="col-12">
                            <label for="courseFullDescriptionInput" class="form-label">Подробное описание</label>
                            <textarea id="courseFullDescriptionInput" class="form-control" rows="3" required></textarea>
                        </div>

                        <div class="col-12 col-md-3">
                            <label for="coursePriceInput" class="form-label">Цена</label>
                            <input id="coursePriceInput" type="number" class="form-control" min="0" required>
                        </div>

                        <div class="col-12 col-md-5">
                            <label for="courseLevelInput" class="form-label">Сложность</label>
                            <select id="courseLevelInput" class="form-select" required>
                                <option value="Начальный">Начальный</option>
                                <option value="Средний">Средний</option>
                                <option value="Продвинутый">Продвинутый</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-4">
                            <label for="courseLanguageInput" class="form-label">Язык</label>
                            <select id="courseLanguageInput" class="form-select" required>
                                <option value="Русский">Русский</option>
                                <option value="Английский">Английский</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-8">
                            <label for="courseImageInput" class="form-label">Ссылка на картинку</label>
                            <input id="courseImageInput" type="url" class="form-control" required>
                        </div>

                        <div class="col-12">
                            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
                                <label class="form-label mb-0">Программа и контент курса</label>
                                <button id="addSectionBtn" type="button" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-plus-circle"></i> Добавить раздел
                                </button>
                            </div>
                            <div id="programSections" class="d-grid gap-3"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-primary" id="saveCourseBtn" form="courseForm">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="node_modules/axios/dist/axios.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/header.js"></script>
<script src="js/my-courses-page.js"></script>
</body>
</html>
