<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — 67 Финансы</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="brand text-decoration-none d-inline-block" aria-label="67 Финансы — на главную">67 Финансы</a>
      <h1 class="h2 mt-3">Создать аккаунт</h1>
      <p class="subtitle">Введите свои данные для регистрации</p>
      <form onsubmit="register(event)" aria-describedby="register-error" novalidate>
        <div class="mb-3">
          <label class="form-label" for="reg-firstName">Имя</label>
          <input type="text" class="form-control" id="reg-firstName" name="firstName"
            placeholder="Иван" autocomplete="given-name" required aria-required="true">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-lastName">Фамилия</label>
          <input type="text" class="form-control" id="reg-lastName" name="lastName"
            placeholder="Иванов" autocomplete="family-name" required aria-required="true">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" class="form-control" id="reg-email" name="email"
            placeholder="example@gmail.com" autocomplete="email" required aria-required="true">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-password">Пароль</label>
          <input type="password" class="form-control" id="reg-password" name="password"
            placeholder="••••••••" autocomplete="new-password" required aria-required="true">
        </div>
        <div id="register-error" class="alert alert-danger d-none py-2 mb-3" role="alert" aria-live="assertive">
          Ошибка регистрации. Возможно, этот email уже занят.
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Создать аккаунт</button>
      </form>
      <p class="mt-4 text-center text-muted small">Уже есть аккаунт? <a href="login.html" class="auth-link">Войти</a></p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
