<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — 67 Финансы</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="brand text-decoration-none d-inline-block" aria-label="67 Финансы — на главную">67 Финансы</a>
      <h1 class="h2 mt-3">Вход</h1>
      <p class="subtitle">Введите данные для входа в аккаунт</p>
      <form onsubmit="login(event)" aria-describedby="login-error" novalidate>
        <div class="mb-3">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" class="form-control" id="login-email" name="email"
            placeholder="example@gmail.com" autocomplete="email" required
            aria-required="true">
        </div>
        <div class="mb-3">
          <label class="form-label" for="login-password">Пароль</label>
          <input type="password" class="form-control" id="login-password" name="password"
            placeholder="••••••••" autocomplete="current-password" required
            aria-required="true">
        </div>
        <div id="login-error" class="alert alert-danger d-none py-2 mb-3" role="alert" aria-live="assertive">
          Неверный email или пароль
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>
      </form>
      <p class="mt-4 text-center text-muted small">Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрироваться</a></p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
