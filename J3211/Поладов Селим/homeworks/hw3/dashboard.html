<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — 67 Финансы</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/light.css" rel="stylesheet">
  <link href="css/dark.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script>
    (function () {
      var saved = localStorage.getItem('theme')
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      var theme = saved || preferred
      document.documentElement.setAttribute('data-theme', theme)
      document.documentElement.setAttribute('data-bs-theme', theme)
    })()
  </script>
  <script src="js/theme.js"></script>
</head>
<body>
  <aside class="sidebar d-flex flex-column" aria-label="Боковая панель">
    <a href="dashboard.html" class="brand text-decoration-none" aria-label="67 Финансы — на главную">67 Финансы</a>
    <nav class="flex-grow-1 pt-2" aria-label="Основная навигация">
      <a href="dashboard.html" class="nav-link active" aria-current="page">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Главная</span>
      </a>
      <a href="transactions.html" class="nav-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
        <span>Транзакции</span>
      </a>
      <a href="reports.html" class="nav-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        <span>Отчёты</span>
      </a>
      <a href="integration.html" class="nav-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        <span>Интеграции</span>
      </a>
    </nav>
    <div class="nav-bottom px-3 pb-3">
      <a href="#" class="nav-link" onclick="logout()" aria-label="Выйти из аккаунта">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        <span>Выход</span>
      </a>
    </div>
  </aside>
  <main class="main-wrap">
    <div class="header-row">
      <h1>Личный кабинет</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Переключить тему">
          <svg class="icon-moon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="icon-sun" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
        </button>
        <div class="dropdown">
          <button type="button" class="user-menu dropdown-toggle" data-bs-toggle="dropdown"
            aria-expanded="false" aria-label="Меню пользователя" aria-haspopup="true">
            <div class="user-avatar" aria-hidden="true">
              <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <span class="d-none d-md-inline" id="user-name">—</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end" role="menu">
            <li role="none"><a class="dropdown-item" href="settings.html" role="menuitem">Настройки</a></li>
            <li role="none"><hr class="dropdown-divider"></li>
            <li role="none"><a class="dropdown-item text-danger" href="#" role="menuitem" onclick="logout(); return false;">Выйти</a></li>
          </ul>
        </div>
      </div>
    </div>

    <section aria-label="Финансовые показатели">
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <div class="card card-metric dark">
            <div class="small opacity-75" id="label-balance">Общий баланс</div>
            <div class="value" id="total-balance" aria-labelledby="label-balance">—</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card card-metric light">
            <div class="small text-muted" id="label-expenses">Расходы за месяц</div>
            <div class="value" id="monthly-expenses" aria-labelledby="label-expenses">—</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card card-metric light">
            <div class="small text-muted" id="label-savings">Накоплено</div>
            <div class="value" id="savings" aria-labelledby="label-savings">—</div>
          </div>
        </div>
      </div>
    </section>

    <section class="content-card py-2 mb-4" aria-label="Курсы валют">
      <div class="d-flex flex-wrap gap-4 align-items-center">
        <span class="text-muted small fw-medium">Курсы валют</span>
        <span class="small"><span aria-hidden="true">🇺🇸</span> USD → <strong id="usd-rub">—</strong> ₽</span>
        <span class="small"><span aria-hidden="true">🇪🇺</span> EUR → <strong id="eur-rub">—</strong> ₽</span>
        <span class="small text-muted ms-auto" id="rates-date" aria-live="polite"></span>
      </div>
    </section>

    <div class="row">
      <div class="col-lg-8">
        <section class="content-card" aria-label="Последние транзакции">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Последние транзакции</h2>
            <a href="transactions.html" class="btn btn-sm btn-link text-decoration-none p-0">Все →</a>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" aria-label="Последние транзакции">
              <thead>
                <tr>
                  <th scope="col">Название</th>
                  <th scope="col">Тип</th>
                  <th scope="col">Сумма</th>
                  <th scope="col">Дата</th>
                </tr>
              </thead>
              <tbody id="recent-tbody">
                <tr><td colspan="4" class="text-center text-muted py-3">Загрузка...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
      <div class="col-lg-4">
        <section class="content-card" aria-label="Список счетов">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Счета</h2>
          </div>
          <ul class="list-unstyled mb-0" id="accounts-list" aria-live="polite">
            <li class="text-center text-muted py-3">Загрузка...</li>
          </ul>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
