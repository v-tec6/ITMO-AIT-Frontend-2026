<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — 67 Финансы</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/light.css" rel="stylesheet">
  <link href="css/dark.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script>
    (function () {
      var saved = localStorage.getItem('theme')
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      var theme = saved || preferred
      document.documentElement.setAttribute('data-theme', theme)
      document.documentElement.setAttribute('data-bs-theme', theme)
    })()
  </script>
  <script src="js/theme.js"></script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle-fixed" onclick="toggleTheme()" aria-label="Переключить тему">
    <svg class="icon-moon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    <svg class="icon-sun" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
  </button>
  <main class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="brand text-decoration-none d-inline-block" aria-label="67 Финансы — на главную">67 Финансы</a>
      <h1 class="h2 mt-3">Создать аккаунт</h1>
      <p class="subtitle">Введите свои данные для регистрации</p>
      <form onsubmit="register(event)" aria-describedby="register-error" novalidate>
        <div class="mb-3">
          <label class="form-label" for="reg-firstName">Имя</label>
          <input type="text" class="form-control" id="reg-firstName" name="firstName"
            placeholder="Иван" autocomplete="given-name" required aria-required="true">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-lastName">Фамилия</label>
          <input type="text" class="form-control" id="reg-lastName" name="lastName"
            placeholder="Иванов" autocomplete="family-name" required aria-required="true">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" class="form-control" id="reg-email" name="email"
            placeholder="example@gmail.com" autocomplete="email" required aria-required="true">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-password">Пароль</label>
          <input type="password" class="form-control" id="reg-password" name="password"
            placeholder="••••••••" autocomplete="new-password" required aria-required="true">
        </div>
        <div id="register-error" class="alert alert-danger d-none py-2 mb-3" role="alert" aria-live="assertive">
          Ошибка регистрации. Возможно, этот email уже занят.
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Создать аккаунт</button>
      </form>
      <p class="mt-4 text-center text-muted small">Уже есть аккаунт? <a href="login.html" class="auth-link">Войти</a></p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
