<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Войти в аккаунт</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body class="auth-page">
<!-- Auth -->
<main class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="auth-shell mx-auto">
        <div class="auth-card shadow-lg">
            <input class="auth-toggle" type="radio" name="authTab" id="tabLogin" checked>
            <input class="auth-toggle" type="radio" name="authTab" id="tabSignup">

            <div class="auth-head">
                <div class="auth-tabs">
                    <label class="auth-tab" for="tabLogin">Вход</label>
                    <label class="auth-tab" for="tabSignup">Регистрация</label>
                    <span class="auth-indicator" aria-hidden="true"></span>
                </div>
            </div>

            <div class="auth-body">
                <div class="auth-panels">
                    <section class="auth-panel">
                        <form action="#" method="post" class="needs-validation vstack gap-3" novalidate>
                            <div class="form-floating">
                                <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                                <label for="loginEmail">Почта</label>
                            </div>

                            <div class="form-floating">
                                <input type="password" class="form-control" id="loginPass" placeholder="Пароль" required>
                                <label for="loginPass">Пароль</label>
                            </div>

                            <div class="d-flex justify-content-between align-items-center small">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Не выходить из аккаунта</label>
                                </div>
                                <a class="link-success text-decoration-none" href="#">Восстановить пароль</a>
                            </div>

                            <button class="btn btn-success btn-lg w-100 auth-btn" type="submit">
                                Войти
                            </button>
                        </form>
                    </section>

                    <section class="auth-panel">
                        <form action="#" method="post" class="needs-validation vstack gap-3" novalidate>
                            <div class="row g-2">
                                <div class="col-12 col-sm-6">
                                    <div class="form-floating">
                                        <input type="text" class="form-control" id="firstName" placeholder="Имя" required>
                                        <label for="firstName">Имя</label>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-floating">
                                        <input type="text" class="form-control" id="lastName" placeholder="Фамилия" required>
                                        <label for="lastName">Фамилия</label>
                                    </div>
                                </div>
                            </div>

                            <div class="form-floating">
                                <input type="email" class="form-control" id="signupEmail" placeholder="name@example.com" required>
                                <label for="signupEmail">Почта</label>
                            </div>

                            <div class="form-floating">
                                <input type="password" class="form-control" id="signupPass" placeholder="Пароль" required minlength="6">
                                <label for="signupPass">Пароль</label>
                            </div>

                            <div class="form-check small">
                                <input class="form-check-input" type="checkbox" id="agree" required>
                                <label class="form-check-label" for="agree">
                                    Какие-то правила?
                                </label>
                            </div>

                            <button class="btn btn-success btn-lg w-100 auth-btn" type="submit">
                                Зарегистрироваться
                            </button>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </div>
</main>
<!-- /Auth -->

<script>
    (() => {
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach((form) => {
            form.addEventListener('submit', (e) => {
                if (!form.checkValidity()) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
</body>
</html>
