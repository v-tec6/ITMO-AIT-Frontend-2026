<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Личный кабинет</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="profile-page">
<header class="header">
    <nav class="navbar navbar-expand-lg fixed-top navigation" aria-label="Навигация личного кабинета">
        <div class="container">
            <a class="navbar-brand me-auto" href="index.html">Мероприятия гимназии</a>

            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                 aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Мероприятия гимназии</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>

                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-center flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="index.html">Главная</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2 active" href="profile.html" aria-current="page">Личный кабинет</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="login.html">Стать организатором</a>
                        </li>
                    </ul>
                </div>
            </div>

            <a href="login.html" class="login-button">Войти</a>

            <button class="navbar-toggler pe-0" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
</header>

<main class="main pt-5">
    <section class="events-explorer py-5">
        <div class="container pt-4 pt-lg-5">
            <div class="events-shell">
                <div class="events-intro profile-intro">
                    <span class="events-kicker">Личный кабинет</span>
                    <h1 class="events-title mb-2">Ваши записи на мероприятия</h1>
                    <p class="events-counter mb-0 text-break-safe" id="profileUserText">Загрузка данных пользователя...</p>
                </div>

                <div class="events-meta-row">
                    <p class="events-counter mb-0" id="profileCounter">Записей: 0</p>
                </div>

                <div class="profile-state-card d-none" id="profileStateCard">
                    <h2 class="events-empty-title mb-2" id="profileStateTitle">Нет данных</h2>
                    <p class="events-empty-text mb-3" id="profileStateText"></p>
                    <a href="login.html" class="profile-state-action site-button" id="profileStateAction">Войти</a>
                </div>

                <div class="row g-4" id="profileEventsGrid"></div>
            </div>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="container footer-row">
        <p class="footer-text mb-0">Мероприятия гимназии</p>
        <button type="button" class="footer-logout subtle-button" data-auth-logout>Выйти</button>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="js/profile.js"></script>
<script src="js/session.js"></script>
</body>
</html>
