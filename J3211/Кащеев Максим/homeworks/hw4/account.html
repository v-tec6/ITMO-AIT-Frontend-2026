<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Личный кабинет – MLDrop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="account.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #000;
      color: #fff;
      padding: 8px;
      z-index: 100;
    }
    .skip-link:focus { top: 0; }
    button:focus-visible, a:focus-visible { outline: 3px solid #005fcc; outline-offset: 2px; }
  </style>
</head>
<body>
  <a href="#account-main-content" class="skip-link">Перейти к личному кабинету</a>
  <div class="account-shell">
    <div class="account-wrapper">
      <aside class="account-sidebar" aria-label="Боковое меню">
        <div class="account-avatar-row">
          <div class="account-avatar" id="accountAvatar"><span id="accountAvatarInitials">??</span></div>
          <div>
            <div class="account-username">Имя пользователя</div>
            <div class="account-email">email@example.com</div>
            <button class="btn btn-outline-secondary btn-sm mt-2" id="changeAvatarBtn" aria-label="Изменить аватар">Изменить аватар</button>
          </div>
        </div>
        <nav class="sidebar-nav">
          <button class="sidebar-item active" data-tab="favorites" aria-label="Понравившиеся модели"><i class="bi bi-heart" aria-hidden="true"></i> Понравившиеся модели</button>
          <button class="sidebar-item" data-tab="uploads" aria-label="Загруженные модели"><i class="bi bi-cloud-upload" aria-hidden="true"></i> Загруженные модели</button>
        </nav>
        <div class="sidebar-footer">
          <a href="index.html" class="btn btn-outline-secondary btn-sm w-100 mb-2">На главную</a>
          <button id="themeToggleBtn" class="btn btn-outline-glass btn-sm w-100 mb-2" aria-label="Переключить тему">
            <i class="bi bi-moon-fill" aria-hidden="true"></i> Тема
          </button>
          <button class="btn btn-outline-danger btn-sm w-100" id="logoutBtnSidebar" aria-label="Выйти">Выйти</button>
        </div>
      </aside>
      <main id="account-main-content" class="account-main">
        <div class="account-main-header">
          <div>
            <div class="account-main-title">Личный кабинет</div>
            <div class="account-main-subtitle" id="tabDescription">Ваши понравившиеся модели</div>
          </div>
          <button class="btn-upload" aria-label="Загрузить модель"><i class="bi bi-plus-lg" aria-hidden="true"></i> Загрузить модель</button>
        </div>
        <section class="account-content">
          <div id="tabFavorites" role="tabpanel" aria-labelledby="favorites-tab">
            <div id="favoritesList" class="row g-3"></div>
            <div id="favoritesEmpty" class="text-center mt-4">Нет понравившихся моделей</div>
          </div>
          <div id="tabUploads" class="d-none" role="tabpanel" aria-labelledby="uploads-tab">Раздел загруженных моделей</div>
        </section>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      const userRaw = localStorage.getItem("user");
      if (!token || !userRaw) { window.location.href = "registration.html"; return; }
      const user = JSON.parse(userRaw);
      document.querySelector(".account-username").textContent = user.name;
      document.querySelector(".account-email").textContent = user.email;
      document.getElementById("accountAvatarInitials").textContent = (user.name?.slice(0,2) || "??").toUpperCase();
      document.getElementById("logoutBtnSidebar")?.addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "index.html";
      });
      const tabs = document.querySelectorAll(".sidebar-item");
      const favoritesPanel = document.getElementById("tabFavorites");
      const uploadsPanel = document.getElementById("tabUploads");
      const desc = document.getElementById("tabDescription");
      tabs.forEach(btn => {
        btn.addEventListener("click", () => {
          tabs.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          if (btn.dataset.tab === "favorites") {
            favoritesPanel.classList.remove("d-none");
            uploadsPanel.classList.add("d-none");
            desc.textContent = "Понравившиеся модели";
          } else {
            favoritesPanel.classList.add("d-none");
            uploadsPanel.classList.remove("d-none");
            desc.textContent = "Загруженные модели";
          }
        });
      });
      const favIds = JSON.parse(localStorage.getItem("favoriteModelIds") || "[]");
      const container = document.getElementById("favoritesList");
      const emptyMsg = document.getElementById("favoritesEmpty");
      if (!favIds.length) {
        emptyMsg.style.display = "block";
        return;
      }
      emptyMsg.style.display = "none";
      for (const id of favIds) {
        try {
          const res = await fetch(`http://localhost:3001/api/model/${id}`);
          if (!res.ok) continue;
          const model = await res.json();
          const row = document.createElement("div");
          row.className = "favorite-row card mb-2 shadow-sm";
          row.innerHTML = `
            <div class="card-body py-2 px-3">
              <div class="fw-semibold">${model.title}</div>
              <div class="text-muted small">${model.description || ""}</div>
              <div class="mt-1"><i class="bi bi-download"></i> ${model.downloads ?? 0}   <i class="bi bi-heart-fill text-danger"></i> ${model.likes ?? 0}</div>
            </div>
          `;
          container.appendChild(row);
        } catch(e) { console.error(e); }
      }
    });
  </script>
  <script src="theme.js"></script>
</body>
</html>
