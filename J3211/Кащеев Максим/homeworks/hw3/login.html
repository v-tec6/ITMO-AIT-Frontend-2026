<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход – MLDrop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    body { background: radial-gradient(circle at top right, #fef6ff 0, #dbf9fe 40%, #baefff 100%); min-height: 100vh; }
    .skip-link { position: absolute; top: -40px; left: 0; background: #000; color: #fff; padding: 8px; z-index: 100; }
    .skip-link:focus { top: 0; }
    button:focus-visible, a:focus-visible, input:focus-visible { outline: 3px solid #005fcc; outline-offset: 2px; }
  </style>
</head>
<body>
  <a href="#login-form" class="skip-link">Перейти к форме входа</a>
  <div class="vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
          <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 mb-3 text-center">Вход в аккаунт</h1>
              <p class="text-muted text-center mb-4">Введите email и пароль, чтобы продолжить</p>
              <form id="loginForm" aria-label="Форма авторизации">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" placeholder="123@gmail.com" required autocomplete="email" aria-required="true">
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Пароль</label>
                  <input type="password" class="form-control" id="password" placeholder="Ваш пароль" required autocomplete="current-password" aria-required="true">
                </div>
                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-primary">Войти</button>
                </div>
              </form>
              <p class="text-center mb-0">Нет аккаунта? <a href="registration.html">Зарегистрироваться</a></p>
              <div class="d-flex gap-2 mt-4">
                <a href="index.html" class="btn btn-outline-secondary flex-grow-1">На главную</a>
                <button id="themeToggleBtn" class="btn btn-outline-glass" aria-label="Переключить тему">
                  <i class="bi bi-moon-fill"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('http://localhost:3001/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { alert(data.message || 'Ошибка входа'); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'account.html';
      } catch (err) { alert('Не удалось связаться с сервером'); }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="theme.js"></script>
</body>
</html>
