<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Подробнее о модели – MLDrop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="model-detail.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #000;
      color: #fff;
      padding: 8px;
      z-index: 100;
    }
    .skip-link:focus { top: 0; }
    button:focus-visible, a:focus-visible { outline: 3px solid #005fcc; outline-offset: 2px; }
  </style>
</head>
<body>
  <a href="#detail-content" class="skip-link">Перейти к деталям модели</a>
  <nav class="navbar navbar-expand-lg glass-navbar" aria-label="Главная навигация">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">MLDrop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="Показать меню">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
          <li class="nav-item"><a class="nav-link" href="models.html">Модели</a></li>
          <li class="nav-item"><a class="nav-link" href="datasets.html">Наборы данных</a></li>
          <li class="nav-item"><a class="nav-link" href="spaces.html">Пространства</a></li>
          <li class="nav-item d-flex align-items-center ms-lg-3" id="navAuthArea">
            <button id="themeToggleBtn" class="btn btn-outline-glass btn-sm me-2" aria-label="Переключить тему">
              <i class="bi bi-moon-fill" aria-hidden="true"></i>
            </button>
            <a class="btn btn-outline-glass btn-sm me-2" href="login.html">Войти</a>
            <a class="btn btn-primary-glass btn-sm" href="registration.html">Регистрация</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <main id="detail-content" class="container page-shell">
    <div class="detail-wrapper" id="detailWrapper" aria-live="polite"></div>
  </main>
  <script type="module">
    const API_BASE = 'http://localhost:3001';
    function getQueryId() { return Number(new URLSearchParams(window.location.search).get('id')); }
    async function initDetail() {
      const wrapper = document.getElementById('detailWrapper');
      const id = getQueryId();
      if (!id) return renderFallback(wrapper);
      try {
        const res = await fetch(`${API_BASE}/api/model/${id}`);
        if (!res.ok) throw new Error();
        const model = await res.json();
        renderModel(wrapper, model);
      } catch { renderFallback(wrapper); }
    }
    function renderModel(wrapper, model) {
      wrapper.innerHTML = `
        <section>
          <h1 class="detail-main-title">${model.title}</h1>
          <div class="detail-badges">
            <span class="badge-pill"><i class="bi bi-cpu" aria-hidden="true"></i> ${model.tagLabel || model.category}</span>
          </div>
          <p class="detail-desc">${model.description || ''}</p>
          <div class="detail-actions">
            <button class="btn-like" id="modelLikeBtn" aria-label="Добавить в избранное"><i class="bi bi-heart" aria-hidden="true"></i> В избранное</button>
            <a href="javascript:history.back()" class="btn-back" aria-label="Назад">Назад</a>
          </div>
        </section>
        <aside class="stats-panel">
          <div class="stats-row"><span>Загрузок</span><span>${model.downloads ?? 0}</span></div>
          <div class="stats-row"><span>Лайки</span><span>${model.likes ?? 0}</span></div>
        </aside>
      `;
      document.getElementById('modelLikeBtn')?.addEventListener('click', () => alert('Избранное (демо)'));
    }
    function renderFallback(wrapper) {
      wrapper.innerHTML = `<p>Модель не найдена. <a href="models.html">Вернуться к каталогу</a></p>`;
    }
    document.addEventListener('DOMContentLoaded', initDetail);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="theme.js"></script>
</body>
</html>
