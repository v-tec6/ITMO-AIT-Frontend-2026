<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Каталог моделей</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="models.css" />
</head>

<body>

  <nav class="navbar navbar-expand-lg glass-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">MLDrop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="models.html">Модели</a></li>
          <li class="nav-item"><a class="nav-link" href="datasets.html">Наборы данных</a></li>
          <li class="nav-item"><a class="nav-link" href="spaces.html">Пространства</a></li>
          <li class="nav-item d-flex align-items-center ms-lg-3" id="navAuthArea">
            <a class="btn btn-outline-glass btn-sm me-2" href="login.html">Войти</a>
            <a class="btn btn-primary-glass btn-sm" href="registration.html">Регистрация</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container page-shell">
    <h1 class="page-title">Каталог моделей</h1>
    <p class="page-subtitle">
      Здесь собраны готовые модели для компьютерного зрения, NLP и работы с табличными данными.
      Выберите категорию, чтобы найти подходящее решение под свою задачу.
    </p>

    <div class="filters-bar" id="filtersBar">
      <button class="pill-filter active" data-category="all">Все модели</button>
      <button class="pill-filter" data-category="cv">Computer Vision</button>
      <button class="pill-filter" data-category="nlp">NLP</button>
      <button class="pill-filter" data-category="video">Видео / Детекция</button>
    </div>

    <section class="models-grid" id="modelsGrid">
    </section>
  </main>

  <script type="module">
    const API_BASE = 'http://localhost:3001';

    function isLoggedIn() {
      return !!localStorage.getItem('token');
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }

    async function handleJson(res) {
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(text || `HTTP ${res.status}`);
      }
      return res.json();
    }

    async function getModels(filters = {}) {
      const params = new URLSearchParams(filters).toString();
      const url = `${API_BASE}/api/models${params ? `?${params}` : ''}`;
      const res = await fetch(url);
      return handleJson(res);
    }

    function setupNavbarAuth() {
      const navAuth = document.getElementById('navAuthArea');
      if (!navAuth) return;

      const token = localStorage.getItem('token');
      const rawUser = localStorage.getItem('user');

      if (!token || !rawUser) return;

      const user = JSON.parse(rawUser);
      navAuth.innerHTML = `
      <div class="d-flex align-items-center gap-2">
        <a href="account.html" class="btn btn-outline-glass btn-sm">
          <i class="bi bi-person-circle me-1"></i>${user.name || 'Мой аккаунт'}
        </a>
        <button class="btn btn-outline-glass btn-sm" id="btnLogout">
          Выйти
        </button>
      </div>
    `;

      document.getElementById('btnLogout')?.addEventListener('click', logout);
    }

    function createModelCard(model, index) {
      const card = document.createElement('article');
      card.className = 'model-card';
      card.dataset.id = model.id;

      const categoryMap = {
        cv: { icon: 'bi-bounding-box', label: 'Computer Vision' },
        nlp: { icon: 'bi-chat-dots', label: 'NLP' },
        gen: { icon: 'bi-magic', label: 'Generative' },
        dataset: { icon: 'bi-database', label: 'Dataset' },
        tabular: { icon: 'bi-table', label: 'Tabular' },
        audio: { icon: 'bi-soundwave', label: 'Audio' },
        multimodal: { icon: 'bi-layers', label: 'Multimodal' },
        video: { icon: 'bi-camera-video', label: 'Видео / Детекция' }
      };

      const cat = categoryMap[model.category] || { icon: 'bi-cpu', label: model.shortType || 'Model' };
      const badgeText = model.tagLabel || `${cat.label} · Model`;

      const likedIds = JSON.parse(localStorage.getItem('likedModelIds') || '[]');
      const favoriteIds = JSON.parse(localStorage.getItem('favoriteModelIds') || '[]');
      const isLiked = likedIds.includes(model.id);
      const isFavorite = favoriteIds.includes(model.id);

      card.innerHTML = `
      <div class="d-flex justify-content-between align-items-center mb-1">
        <span class="model-badge badge-tag" data-tag="${model.tagLabel || cat.label}">
          <i class="bi ${cat.icon}"></i> ${badgeText}
        </span>
        <span class="model-tag-pill">${model.shortType || cat.label}</span>
      </div>
      <h2 class="model-title mb-0">${model.title}</h2>
      <div class="model-meta">
        Категория: ${cat.label}
      </div>
      <p class="model-desc">
        ${model.description || ''}
      </p>
      <div class="model-footer">
        <div class="model-stats">
          <span><i class="bi bi-download"></i> ${model.downloads ?? 0}</span>
          <span><i class="bi bi-eye"></i> ${Math.round((model.downloads ?? 0) * 1.7)}</span>
        </div>
        <div class="model-actions">
          <span class="like-btn ${isLiked ? 'text-danger' : ''}" data-id="${model.id}">
            <i class="bi bi-heart${isLiked ? '-fill' : ''}"></i> ${model.likes ?? 0}
          </span>
          <span class="favorite-btn ${isFavorite ? 'text-warning' : ''}" data-id="${model.id}">
            <i class="bi bi-star${isFavorite ? '-fill' : ''}"></i>
          </span>
        </div>
      </div>
    `;

      const badgeEl = card.querySelector('.badge-tag');
      badgeEl?.addEventListener('click', (e) => {
        e.stopPropagation();
        const tag = badgeEl.getAttribute('data-tag') || '';
        applyFilter({ search: tag });
      });

      card.addEventListener('click', (e) => {
        if (e.target.closest('.like-btn') || e.target.closest('.favorite-btn') || e.target.closest('.badge-tag')) {
          return;
        }
        window.location.href = `model-detail.html?id=${model.id}`;
      });


      const likeEl = card.querySelector('.like-btn');
      likeEl?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!isLoggedIn()) {
          alert('Войдите, чтобы ставить лайки');
          window.location.href = 'login.html';
          return;
        }
        let liked = JSON.parse(localStorage.getItem('likedModelIds') || '[]');
        const already = liked.includes(model.id);
        if (already) {
          liked = liked.filter(id => id !== model.id);
        } else {
          liked.push(model.id);
        }
        localStorage.setItem('likedModelIds', JSON.stringify(liked));

        const icon = likeEl.querySelector('i');
        if (!already) {
          likeEl.classList.add('text-danger');
          icon.classList.replace('bi-heart', 'bi-heart-fill');
        } else {
          likeEl.classList.remove('text-danger');
          icon.classList.replace('bi-heart-fill', 'bi-heart');
        }
      });

      const favEl = card.querySelector('.favorite-btn');
      favEl?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!isLoggedIn()) {
          alert('Войдите, чтобы добавлять модели в избранное');
          window.location.href = 'login.html';
          return;
        }
        let favorites = JSON.parse(localStorage.getItem('favoriteModelIds') || '[]');
        const already = favorites.includes(model.id);
        if (already) {
          favorites = favorites.filter(id => id !== model.id);
        } else {
          favorites.push(model.id);
        }
        localStorage.setItem('favoriteModelIds', JSON.stringify(favorites));

        const icon = favEl.querySelector('i');
        if (!already) {
          favEl.classList.add('text-warning');
          icon.classList.replace('bi-star', 'bi-star-fill');
        } else {
          favEl.classList.remove('text-warning');
          icon.classList.replace('bi-star-fill', 'bi-star');
        }
      });

      return card;
    }

    async function renderModels(filters = {}) {
      const grid = document.getElementById('modelsGrid');
      if (!grid) return;

      grid.innerHTML = '<p class="text-muted">Загрузка моделей...</p>';

      try {
        const models = await getModels(filters);
        grid.innerHTML = '';

        if (!Array.isArray(models) || !models.length) {
          grid.innerHTML = '<p class="text-muted">По вашему запросу ничего не найдено.</p>';
          return;
        }

        models.forEach((m, idx) => {
          grid.appendChild(createModelCard(m, idx));
        });
      } catch (e) {
        console.error('renderModels error:', e);
        grid.innerHTML = '<p class="text-danger">Ошибка загрузки моделей.</p>';
      }
    }

    function setupCategoryFilters() {
      const bar = document.getElementById('filtersBar');
      if (!bar) return;
      const buttons = Array.from(bar.querySelectorAll('.pill-filter'));

      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const cat = btn.getAttribute('data-category');
          if (!cat || cat === 'all') {
            renderModels();
          } else if (cat === 'video') {
            renderModels({ search: 'video detection детекция traffic camera' });
          } else {
            renderModels({ category: cat });
          }
        });
      });
    }

    function applyFilter(filterObj) {
      const bar = document.getElementById('filtersBar');
      if (bar) {
        const buttons = Array.from(bar.querySelectorAll('.pill-filter'));
        buttons.forEach(b => b.classList.remove('active'));
        const allBtn = buttons.find(b => b.getAttribute('data-category') === 'all');
        allBtn && allBtn.classList.add('active');
      }
      renderModels(filterObj);
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupNavbarAuth();
      setupCategoryFilters();
      renderModels();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
