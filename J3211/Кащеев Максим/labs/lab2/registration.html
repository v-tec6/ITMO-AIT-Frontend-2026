<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <style>
        body {
            background: radial-gradient(circle at top right, #fef6ff 0, #dbf9fe 40%, #baefff 100%);
            margin: 0;
            min-height: 100vh;
            color: #0f172a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            position: relative;
            overflow-x: hidden;
        }
    </style>
</head>

<body>
    <section class="vh-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                    <div class="card shadow-sm">
                        <div class="card-body p-4 p-md-5">
                            <h1 class="h3 mb-3 text-center">Создать аккаунт</h1>
                            <p class="text-muted text-center mb-4">
                                Зарегистрируйтесь, чтобы публиковать модели и датасеты
                            </p>

                            <form id="registerForm">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Имя</label>
                                    <input type="text" class="form-control" id="name"
                                        placeholder="Ваше имя в личном кабинете" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email"
                                        placeholder="Например: 123@gmail.com" required>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Пароль</label>
                                    <input type="password" class="form-control" id="password"
                                        placeholder="Минимум 6 символов" required>
                                </div>

                                <div class="mb-3">
                                    <label for="password2" class="form-label">Повторите пароль</label>
                                    <input type="password" class="form-control" id="password2"
                                        placeholder="Повторите пароль" required>
                                </div>

                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" id="terms">
                                    <label class="form-check-label" for="terms">
                                        Я не читал условия соглашения
                                    </label>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                                </div>

                                <p class="text-center">
                                    Уже есть аккаунт? <a href="login.html">Войти</a>
                                </p>

                                <div class="d-grid p-1">
                                    <a href="index.html" class="btn btn-outline-secondary">
                                        <i class="bi bi-house-door me-2"></i>На главную
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registerForm');
            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const password2 = document.getElementById('password2').value;

                if (password !== password2) {
                    alert('Пароли не совпадают');
                    return;
                }

                try {
                    const res = await fetch('http://localhost:3001/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        alert(data.message || 'Ошибка регистрации');
                        return;
                    }

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    window.location.href = 'account.html';
                } catch (err) {
                    console.error(err);
                    alert('Не удалось связаться с сервером');
                }
            });
        });

        const logoutBtn = document.getElementById('logoutBtnSidebar');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });
        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
