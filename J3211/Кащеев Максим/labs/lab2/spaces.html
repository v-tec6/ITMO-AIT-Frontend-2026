<head>
    <meta charset="UTF-8" />
    <title>Пространства</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="spaces.css" />
</head>

<body>

    <nav class="navbar navbar-expand-lg glass-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MLDrop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="models.html">Модели</a></li>
                    <li class="nav-item"><a class="nav-link" href="datasets.html">Наборы данных</a></li>
                    <li class="nav-item"><a class="nav-link active" href="spaces.html">Пространства</a></li>
                    <li class="nav-item d-flex align-items-center ms-lg-3" id="navAuthArea">
                        <a class="btn btn-outline-glass btn-sm me-2" href="login.html">Войти</a>
                        <a class="btn btn-primary-glass btn-sm" href="registration.html">Регистрация</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-shell">
        <h1 class="page-title">Пространства</h1>
        <p class="page-subtitle">
            Интерактивные демо‑пространства: запустите модель прямо в браузере, загрузите свои данные
            и посмотрите результаты на практике.
        </p>

        <section class="spaces-grid" id="spacesGrid">
        </section>
    </main>

    <script type="module">
        const API_BASE = 'http://localhost:3001';

        function isLoggedIn() {
            return !!localStorage.getItem('token');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        async function handleJson(res) {
            if (!res.ok) {
                const text = await res.text().catch(() => '');
                throw new Error(text || `HTTP ${res.status}`);
            }
            return res.json();
        }

        async function getSpaces(filters = {}) {
            const params = new URLSearchParams(filters).toString();
            const url = `${API_BASE}/api/spaces${params ? `?${params}` : ''}`;
            const res = await fetch(url);
            return handleJson(res);
        }

        function setupNavbarAuth() {
            const navAuth = document.getElementById('navAuthArea');
            if (!navAuth) return;

            const token = localStorage.getItem('token');
            const rawUser = localStorage.getItem('user');

            if (!token || !rawUser) return;

            const user = JSON.parse(rawUser);
            navAuth.innerHTML = `
      <div class="d-flex align-items-center gap-2">
        <a href="account.html" class="btn btn-outline-glass btn-sm">
          <i class="bi bi-person-circle me-1"></i>${user.name || 'Мой аккаунт'}
        </a>
        <button class="btn btn-outline-glass btn-sm" id="btnLogout">
          Выйти
        </button>
      </div>
    `;

            document.getElementById('btnLogout')?.addEventListener('click', logout);
        }

        function createSpaceCard(space, index) {
            const card = document.createElement('article');
            card.className = 'space-card';
            card.dataset.id = space.id;

            const likedIds = JSON.parse(localStorage.getItem('likedSpaceIds') || '[]');
            const isLiked = likedIds.includes(space.id);

            card.innerHTML = `
      <span class="space-tag" data-tag="${space.badge || ''}">
        <i class="bi bi-lightning-charge"></i> ${space.badge || 'Demo · Space'}
      </span>
      <h2 class="space-title mb-0">${space.title}</h2>
      <div class="space-meta">${space.extra1 || ''}</div>
      <p class="space-desc">
        ${space.description || ''}
      </p>
      <div class="space-footer">
        <div class="space-stats">
          <span><i class="bi bi-people"></i> ${space.runs ?? 0} запусков</span>
          <span class="like-btn ${isLiked ? 'text-danger' : ''}" data-id="${space.id}">
            <i class="bi bi-heart${isLiked ? '-fill' : ''}"></i> ${space.likes ?? 0}
          </span>
        </div>
        <a href="#" class="text-decoration-none small">
          Открыть пространство <i class="bi bi-arrow-right-short"></i>
        </a>
      </div>
    `;

            const tagEl = card.querySelector('.space-tag');
            tagEl?.addEventListener('click', (e) => {
                e.stopPropagation();
                const tag = tagEl.getAttribute('data-tag') || '';
                applySpaceFilter({ search: tag });
            });

            card.addEventListener('click', (e) => {
                if (e.target.closest('.like-btn') || e.target.closest('.space-tag')) {
                    return;
                }
                alert(`Здесь могла бы быть страница пространства "${space.title}"`);
            });

            const likeEl = card.querySelector('.like-btn');
            likeEl?.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isLoggedIn()) {
                    alert('Войдите, чтобы ставить лайки пространствам');
                    window.location.href = 'login.html';
                    return;
                }
                let liked = JSON.parse(localStorage.getItem('likedSpaceIds') || '[]');
                const already = liked.includes(space.id);
                liked = already ? liked.filter(id => id !== space.id) : [...liked, space.id];
                localStorage.setItem('likedSpaceIds', JSON.stringify(liked));
                const icon = likeEl.querySelector('i');
                if (!already) {
                    likeEl.classList.add('text-danger');
                    icon.classList.replace('bi-heart', 'bi-heart-fill');
                } else {
                    likeEl.classList.remove('text-danger');
                    icon.classList.replace('bi-heart-fill', 'bi-heart');
                }
            });

            return card;
        }

        async function renderSpaces(filters = {}) {
            const grid = document.getElementById('spacesGrid');
            if (!grid) return;

            grid.innerHTML = '<p class="text-muted">Загрузка пространств...</p>';

            try {
                const spaces = await getSpaces(filters);
                grid.innerHTML = '';

                if (!Array.isArray(spaces) || !spaces.length) {
                    grid.innerHTML = '<p class="text-muted">По вашему запросу ничего не найдено.</p>';
                    return;
                }

                spaces.forEach((s, idx) => {
                    grid.appendChild(createSpaceCard(s, idx));
                });
            } catch (e) {
                console.error('renderSpaces error:', e);
                grid.innerHTML = '<p class="text-danger">Ошибка загрузки пространств.</p>';
            }
        }

        function applySpaceFilter(filterObj) {
            renderSpaces(filterObj);
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupNavbarAuth();
            renderSpaces();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
