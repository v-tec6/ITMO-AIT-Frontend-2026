<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Подробнее о модели</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="model-detail.css" />
</head>

<body>

  <nav class="navbar navbar-expand-lg glass-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">MLDrop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
          <li class="nav-item"><a class="nav-link" href="models.html">Модели</a></li>
          <li class="nav-item"><a class="nav-link" href="datasets.html">Наборы данных</a></li>
          <li class="nav-item"><a class="nav-link" href="spaces.html">Пространства</a></li>
          <li class="nav-item d-flex align-items-center ms-lg-3" id="navAuthArea">
            <a class="btn btn-outline-glass btn-sm me-2" href="login.html">Войти</a>
            <a class="btn btn-primary-glass btn-sm" href="registration.html">Регистрация</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container page-shell">
    <div class="detail-wrapper" id="detailWrapper">
    </div>
  </main>

  <script type="module">
    const API_BASE = 'http://localhost:3001';

    function setupNavbarAuth() {
      const navAuth = document.getElementById('navAuthArea');
      if (!navAuth) return;

      const token = localStorage.getItem('token');
      const rawUser = localStorage.getItem('user');

      if (!token || !rawUser) return;

      const user = JSON.parse(rawUser);
      navAuth.innerHTML = `
      <div class="d-flex align-items-center gap-2">
        <a href="account.html" class="btn btn-outline-glass btn-sm">
          <i class="bi bi-person-circle me-1"></i>${user.name || 'Мой аккаунт'}
        </a>
        <button class="btn btn-outline-glass btn-sm" id="btnLogout">
          Выйти
        </button>
      </div>
    `;

      document.getElementById('btnLogout')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
      });
    }

    function getQueryId() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      return id ? Number(id) : null;
    }

    function renderFallback(wrapper) {
      wrapper.innerHTML = `
      <section>
        <h1 class="detail-main-title">ResNet‑50 Custom</h1>
        <div class="detail-meta">
          medAI · Computer Vision · PyTorch · Обновлено 10 февраля
        </div>

        <div class="detail-badges">
          <span class="badge-pill">
            <i class="bi bi-bounding-box"></i> Классификация изображений
          </span>
          <span class="badge-pill">
            <i class="bi bi-cpu"></i> ResNet‑50 · Fine-tuning
          </span>
          <span class="badge-pill">
            <i class="bi bi-cloud-download"></i> Доступна для скачивания
          </span>
        </div>

        <p class="detail-desc">
          Дообученная модель ResNet‑50 для классификации медицинских снимков.
          Модель обучена на 12 000 МРТ‑изображений мозга и достигает точности 94% на валидационном наборе.
          Подходит для задач первичного скрининга и встраивания в PACS‑системы.
        </p>

        <h2 class="detail-section-title">Особенности</h2>
        <ul class="detail-list">
          <li>Поддержка входных изображений 224×224 и 512×512 пикселей.</li>
          <li>Нормализация по статистике ImageNet и медицинского датасета.</li>
          <li>Скрипты для инференса на CPU и GPU.</li>
        </ul>

        <h2 class="detail-section-title mt-3">Формат</h2>
        <ul class="detail-list">
          <li>Вес модели: ~180 MB.</li>
          <li>Формат: PyTorch \`.pt\` + пример конвертации в ONNX.</li>
        </ul>

        <div class="detail-actions">
          <button class="btn btn-primary-glass btn-sm">
            <i class="bi bi-download"></i> Скачать модель
          </button>
          <button class="btn-like" id="fallbackLikeBtn">
            <i class="bi bi-heart"></i> Добавить в избранное
          </button>
          <a href="javascript:history.back()" class="btn-back">
            <i class="bi bi-arrow-left"></i> Назад
          </a>
        </div>
      </section>

      <aside class="stats-panel">
        <div class="stats-row">
          <span>Загрузок</span>
          <span class="stats-value">2 330</span>
        </div>
        <div class="stats-row">
          <span>Просмотры</span>
          <span class="stats-value">4 650</span>
        </div>
        <div class="stats-row">
          <span>Лайки</span>
          <span class="stats-value">344</span>
        </div>

        <hr class="my-1" />

        <div class="stats-row">
          <span>Точность (val)</span>
          <span class="stats-value">94%</span>
        </div>
        <div class="stats-row">
          <span>mAP / F1</span>
          <span class="stats-value">0.91 / 0.89</span>
        </div>

        <div class="stats-row">
          <span>Лицензия</span>
          <span class="stats-pill">
            <i class="bi bi-shield-check"></i> Apache‑2.0
          </span>
        </div>
      </aside>
    `;
    }

    function renderFromModel(wrapper, model) {
      const downloads = model.downloads ?? 0;
      const likes = model.likes ?? 0;
      const tag = model.tagLabel || model.shortType || model.category || 'Model';

      wrapper.innerHTML = `
      <section>
        <h1 class="detail-main-title">${model.title}</h1>
        <div class="detail-meta">
          Категория: ${tag}
        </div>

        <div class="detail-badges">
          <span class="badge-pill">
            <i class="bi bi-cpu"></i> ${tag}
          </span>
          <span class="badge-pill">
            <i class="bi bi-cloud-download"></i> Доступна для скачивания
          </span>
        </div>

        <p class="detail-desc">
          ${model.description || 'Описание модели скоро будет добавлено.'}
        </p>

        <h2 class="detail-section-title">Особенности</h2>
        <ul class="detail-list">
          <li>Slug модели: <code>${model.slug || 'нет'}</code>.</li>
          <li>Категория: ${model.category || '—'}.</li>
          <li>Доп. метрика: ${model.extra1 || model.badge || '—'}.</li>
        </ul>

        <div class="detail-actions">
          <button class="btn btn-primary-glass btn-sm">
            <i class="bi bi-download"></i> Скачать модель
          </button>
          <button class="btn-like" id="modelLikeBtn">
            <i class="bi bi-heart"></i> Добавить в избранное
          </button>
          <a href="javascript:history.back()" class="btn-back">
            <i class="bi bi-arrow-left"></i> Назад
          </a>
        </div>
      </section>

      <aside class="stats-panel">
        <div class="stats-row">
          <span>Загрузок</span>
          <span class="stats-value">${downloads}</span>
        </div>
        <div class="stats-row">
          <span>Лайки</span>
          <span class="stats-value">${likes}</span>
        </div>

        <hr class="my-1" />

        <div class="stats-row">
          <span>Лицензия</span>
          <span class="stats-pill">
            <i class="bi bi-shield-check"></i> Open Source
          </span>
        </div>
      </aside>
    `;

      const likeBtn = document.getElementById('modelLikeBtn');
      if (likeBtn) {
        likeBtn.addEventListener('click', () => {
          if (!localStorage.getItem('token')) {
            alert('Войдите, чтобы добавлять в избранное');
            window.location.href = 'login.html';
            return;
          }
          let favs = JSON.parse(localStorage.getItem('favoriteModelIds') || '[]');
          if (!favs.includes(model.id)) {
            favs.push(model.id);
            localStorage.setItem('favoriteModelIds', JSON.stringify(favs));
            likeBtn.innerHTML = '<i class="bi bi-heart-fill"></i> В избранном';
          }
        });
      }
    }

    async function initDetail() {
      setupNavbarAuth();

      const wrapper = document.getElementById('detailWrapper');
      if (!wrapper) return;

      const id = getQueryId();
      if (!id) {
        renderFallback(wrapper);
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/model/${id}`);
        if (!res.ok) {
          renderFallback(wrapper);
          return;
        }
        const model = await res.json();
        renderFromModel(wrapper, model);
      } catch (e) {
        console.error(e);
        renderFallback(wrapper);
      }
    }

    document.addEventListener('DOMContentLoaded', initDetail);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
