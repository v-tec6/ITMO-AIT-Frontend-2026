<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyingOwl - Направление</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/destination.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success" aria-label="Главная навигация">
        <div class="container">
            <span class="navbar-brand" aria-label="FlyingOwl">
                <i class="bi bi-compass" aria-hidden="true"></i> FlyingOwl
            </span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    aria-expanded="false" aria-controls="navbarNav" aria-label="Открыть меню">
                <span class="navbar-toggler-icon" aria-hidden="true"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" role="list">
                    <li class="nav-item" role="listitem">
                        <a class="nav-link" href="search.html">
                            <i class="bi bi-search" aria-hidden="true"></i> Поиск
                        </a>
                    </li>
                    <li class="nav-item" role="listitem">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-person-circle" aria-hidden="true"></i> Личный кабинет
                        </a>
                    </li>
                    <li class="nav-item" role="listitem">
                        <a class="nav-link" href="#" id="logoutBtn">Выйти</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Подгрузка контента для конкретного маршрута -->
    <main id="destinationContent" class="destination-main">
    </main>

    <!-- Модалка: добавить маршрут -->
    <div class="modal fade" id="addRouteModal" tabindex="-1" aria-labelledby="addRouteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="addRouteModalLabel">
                        <i class="bi bi-map" aria-hidden="true"></i> Детали маршрута
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <form id="addRouteFromDestinationForm">
                        <div class="mb-3">
                            <label for="routeTitle" class="form-label">Название маршрута</label>
                            <input type="text" class="form-control" id="routeTitle" readonly>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="routePoints" class="form-label">Основные точки маршрута</label>
                                <input type="text" class="form-control" id="routePoints" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="routeType" class="form-label">Тип маршрута</label>
                                <input type="text" class="form-control" id="routeType" readonly>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="routeDuration" class="form-label">Длительность</label>
                                <input type="text" class="form-control" id="routeDuration" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="routeBudget" class="form-label">Бюджет</label>
                                <input type="text" class="form-control" id="routeBudget" readonly>
                            </div>
                        </div>
                        <input type="hidden" id="routeDestinationId">
                        <div class="mb-3">
                            <label for="routeDescription" class="form-label">Описание</label>
                            <textarea class="form-control" id="routeDescription" rows="3" readonly></textarea>
                        </div>
                    </form>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-success" onclick="saveRouteFromDestination()">
                        <i class="bi bi-plus-circle" aria-hidden="true"></i> Добавить в маршруты
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 FlyingOwl.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/destination.js"></script>
</body>
</html>
