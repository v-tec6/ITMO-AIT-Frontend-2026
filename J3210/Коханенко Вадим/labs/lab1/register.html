<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyingOwl - Регистрация</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success" aria-label="Главная навигация">
        <div class="container">
            <span class="navbar-brand" aria-label="FlyingOwl">
                <i class="bi bi-compass" aria-hidden="true"></i> FlyingOwl
            </span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    aria-expanded="false" aria-controls="navbarNav" aria-label="Открыть меню">
                <span class="navbar-toggler-icon" aria-hidden="true"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" role="list">
                    <li class="nav-item" role="listitem">
                        <a class="nav-link" href="index.html">Вход</a>
                    </li>
                    <li class="nav-item" role="listitem">
                        <a class="nav-link active" href="register.html" aria-current="page">Регистрация</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <!-- Окно регистрации -->
        <div class="auth-wrapper">
            <div class="card auth-card">
                <div class="card-header text-center">
                    <h1><i class="bi bi-person-plus" aria-hidden="true"></i> Регистрация</h1>
                </div>
                <div class="card-body p-4">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Имя <span aria-hidden="true">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text" aria-hidden="true"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="name" 
                                       aria-required="true" placeholder="Ваше имя" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email <span aria-hidden="true">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text" aria-hidden="true"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" 
                                       aria-required="true" placeholder="example@mail.com" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль <span aria-hidden="true">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text" aria-hidden="true"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" 
                                       aria-required="true" aria-describedby="passwordHint"
                                       placeholder="Минимум 8 символов" required>
                                <div id="passwordHint" class="visually-hidden">Пароль должен содержать минимум 8 символов</div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Подтверждение пароля <span aria-hidden="true">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text" aria-hidden="true"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control" id="confirmPassword" 
                                       aria-required="true" placeholder="Повторите пароль" required>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-person-check" aria-hidden="true"></i> Зарегистрироваться
                            </button>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    <div class="text-center">
                        <p class="mb-0">Уже есть аккаунт? <a href="index.html" class="text-decoration-none">Войти</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 FlyingOwl.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
