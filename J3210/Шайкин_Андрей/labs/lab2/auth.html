<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация | NexusEdu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass p-5">
                    <h2 class="text-center fw-bold mb-4">🌌 NexusEdu</h2>
                    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold" data-bs-toggle="pill" data-bs-target="#login" type="button">Вход</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" data-bs-toggle="pill" data-bs-target="#register" type="button">Регистрация</button>
                        </li>
                    </ul>
                    <div class="tab-content" id="pills-tabContent">
                        <!-- Форма Входа -->
                        <div class="tab-pane fade show active" id="login">
                            <form onsubmit="login(event)">
                                <input type="email" name="email" class="form-control glass-input mb-3 py-2" placeholder="Email" required>
                                <input type="password" name="password" class="form-control glass-input mb-4 py-2" placeholder="Пароль" required>
                                <button type="submit" class="btn glass-btn w-100 py-2 fs-5">Войти</button>
                            </form>
                        </div>
                        <!-- Форма Регистрации -->
                        <div class="tab-pane fade" id="register">
                            <form onsubmit="register(event)">
                                <input type="text" name="firstName" class="form-control glass-input mb-3 py-2" placeholder="Имя" required>
                                <input type="text" name="lastName" class="form-control glass-input mb-3 py-2" placeholder="Фамилия" required>
                                <input type="email" name="email" class="form-control glass-input mb-3 py-2" placeholder="Email" required>
                                <input type="password" name="password" class="form-control glass-input mb-4 py-2" placeholder="Пароль" required>
                                <button type="submit" class="btn glass-btn w-100 py-2 fs-5">Создать аккаунт</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
