<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация | NexusEdu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="glass p-5">
                    <h2 class="text-center fw-bold mb-4">🌌 NexusEdu</h2>
                    
                    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold" data-bs-toggle="pill" data-bs-target="#login" type="button">Авторизация</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" data-bs-toggle="pill" data-bs-target="#register" type="button">Регистрация</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="pills-tabContent">
                        <div class="tab-pane fade show active" id="login">
                            <form id="authForm">
                                <div class="mb-3">
                                    <label class="form-label text-white-50 ms-2">Email</label>
                                    <input type="email" class="form-control glass-input py-2" placeholder="student@itmo.ru" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-white-50 ms-2">Пароль</label>
                                    <input type="password" class="form-control glass-input py-2" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn glass-btn w-100 py-2 fs-5">Войти</button>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="register">
                            <form action="profile.html">
                                <div class="mb-3">
                                    <label class="form-label text-white-50 ms-2">ФИО</label>
                                    <input type="text" class="form-control glass-input py-2" placeholder="Иванов Иван" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-white-50 ms-2">Email</label>
                                    <input type="email" class="form-control glass-input py-2" placeholder="student@itmo.ru" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-white-50 ms-2">Пароль</label>
                                    <input type="password" class="form-control glass-input py-2" placeholder="Придумайте пароль" required>
                                </div>
                                <button type="submit" class="btn glass-btn w-100 py-2 fs-5">Зарегистрироваться</button>
                            </form>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="index.html" class="text-white-50 text-decoration-none small">Продолжить как гость (Каталог)</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
