<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог курсов | NexusEdu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blob-1"></div><div class="bg-blob-2"></div>
    <nav class="navbar navbar-expand-lg glass m-3 px-4 py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white fs-4" href="index.html">🌌 NexusEdu</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navBar"><span class="navbar-toggler-icon" style="filter: invert(1);"></span></button>
            <div class="collapse navbar-collapse" id="navBar">
                <ul class="navbar-nav me-auto ms-4 gap-3">
                    <li class="nav-item"><a class="nav-link text-white fw-bold border-bottom" href="index.html">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="profile.html">Мой кабинет</a></li>
                </ul>
                <a href="auth.html" id="navAuthBtn" class="btn glass-btn px-4">Войти</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5 mb-5">
        <div class="row g-4">

            <aside class="col-lg-3">
                <div class="glass p-4 sticky-top" style="top: 20px;">
                    <h5 class="fw-bold mb-4">Фильтры</h5>
                    
                    <form onsubmit="applyFilters(event)">
                        <div class="mb-3">
                            <label class="form-label text-white-50">Поиск</label>
                            <input type="text" id="searchCourse" class="form-control glass-input" placeholder="Например: Python...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white-50">Направление</label>
                            <select id="categoryFilter" class="form-select glass-input text-white">
                                <option value="">Все направления</option>
                                <option value="Frontend">Frontend</option>
                                <option value="Backend">Backend</option>
                                <option value="Data Science">Data Science</option>
                                <option value="AI">AI / Deep Learning</option>
                            </select>
                        </div>
                        
                        <div class="mb-4 mt-4">
                            <label class="form-label text-white-50 d-flex justify-content-between w-100">
                                <span>Цена</span><span id="priceValue" class="text-white fw-bold">До 100 000 ₽</span>
                            </label>
                            <input type="range" class="form-range" min="0" max="150000" step="5000" value="100000" id="priceRange">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-white-50">Уровень</label>
                            <div class="form-check mb-2 d-flex align-items-center gap-2">
                                <input class="form-check-input glass-input m-0" type="checkbox" id="lvl1" value="lvl1">
                                <label class="form-check-label" for="lvl1">Junior (С нуля)</label>
                            </div>
                            <div class="form-check mb-2 d-flex align-items-center gap-2">
                                <input class="form-check-input glass-input m-0" type="checkbox" id="lvl2" value="lvl2">
                                <label class="form-check-label" for="lvl2">Middle</label>
                            </div>
                            <div class="form-check d-flex align-items-center gap-2">
                                <input class="form-check-input glass-input m-0" type="checkbox" id="lvl3" value="lvl3">
                                <label class="form-check-label" for="lvl3">Senior (Продвинутый)</label>
                            </div>
                        </div>
                        <button type="submit" class="btn glass-btn w-100 py-2">Применить</button>
                    </form>

                </div>
            </aside>

            <main class="col-lg-9">
                <div class="row g-4" id="coursesContainer">
                    <div class="col-12 text-center mt-5"><span class="spinner-border text-primary"></span> Загрузка...</div>
                </div>
            </main>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
