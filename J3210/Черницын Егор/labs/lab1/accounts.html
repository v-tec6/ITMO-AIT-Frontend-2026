<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои счета - MFF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/main.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg shadow-sm bg-white">
    <div class="container">
        <a class="navbar-brand text-custom fw-bold d-flex align-items-center gap-2" href="dash.html">
            <img class="nav-logo" src="imgs/1.png" alt="Логотип MFF" width="35">
            <span class="fs-3 fw-bolder">MFF</span>
            <img class="nav-logo" src="imgs/2.png" alt="Логотип MFF" width="35">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="dash.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="transact.html">Транзакции</a></li>
                <li class="nav-item"><a class="nav-link active" href="accounts.html">Счета</a></li>
            </ul>
            <div class="d-flex">
                <a href="login.html" class="btn btn-outline-custom btn-sm">Выйти</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Мои счета</h3>
        <button id="saveAccountBtn" class="btn btn-custom rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addAccountModal">
            + Добавить счёт
        </button>
    </div>

    <div class="row g-4" id="accountsContainer">

    </div>
</div>

<div class="modal fade" id="addAccountModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">

            <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                <h5 class="modal-title fw-bold text-dark-custom">Новый счет</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>

            <div class="modal-body p-4">
                <form id="addAccountForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Название</label>
                        <input type="text" id="newAccName" class="form-control bg-light border-0" placeholder="Например: Заначка" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Тип счета</label>
                        <select id="newAccType" class="form-select bg-light border-0">
                            <option>Дебетовая карта</option>
                            <option>Кредитная карта</option>
                            <option>Накопительный счет</option>
                            <option>Наличные</option>
                        </select>
                    </div>

                    <div class="row g-2 mb-4">
                        <div class="col-8">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Начальный баланс</label>
                            <input type="number" id="newAccBalance" class="form-control form-control-lg bg-light border-0" placeholder="0.00" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Валюта</label>
                            <select id="newAccCurr" class="form-select bg-light border-0">
                                <option>₽ RUB</option>
                                <option>$ USD</option>
                                <option>€ EUR</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 py-3 mb-3">
                        Сохранить счет
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="addTransactionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                <h5 class="modal-title fw-bold text-dark-custom">Новая транзакция</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body p-4">
                <form id="addTransactionForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Описание</label>
                        <input type="text" id="newTransDesc" class="form-control bg-light border-0" placeholder="Например: поход в вольчек" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Категория</label>
                            <input type="text" id="newTransCategory" list="categoryList" class="form-control bg-light border-0" placeholder="Выберите или введите..." autocomplete="off" required>
                            <datalist id="categoryList"></datalist>
                        </div>
                        <div class="col-6">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Дата</label>
                            <input type="date" id="newTransDate" class="form-control bg-light border-0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Счёт</label>
                        <select id="newTransAccount" class="form-select bg-light border-0" required>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Операция</label>
                        <select id="newTransType" class="form-select bg-light border-0" required>
                            <option value="expense">Расход</option>
                            <option value="income">Доход</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Сумма (₽)</label>
                        <input type="number" id="newTransAmount" class="form-control form-control-lg bg-light border-0" placeholder="0.00" required>
                    </div>
                    <button type="submit" class="btn btn-custom w-100 py-3 rounded-pill fw-bold">
                        Сохранить транзакцию
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/accounts.js"></script>
</html>
