<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои счета - MFF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg shadow-sm bg-white">
    <div class="container">
        <a class="navbar-brand text-custom fw-bold d-flex align-items-center gap-2" href="dash.html">
            <img class="nav-logo" src="imgs/1.png" alt="Логотип MFF" width="35">
            <span class="fs-3 fw-bolder">MFF</span>
            <img class="nav-logo" src="imgs/2.png" alt="Логотип MFF" width="35">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="dash.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="transact.html">Транзакции</a></li>
                <li class="nav-item"><a class="nav-link active" href="accounts.html">Счета</a></li>
            </ul>
            <div class="d-flex">
                <a href="login.html" class="btn btn-outline-custom btn-sm">Выйти</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Мои счета</h3>
        <button id="saveAccountBtn" class="btn btn-custom rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addAccountModal">
            + Добавить счёт
        </button>
    </div>

    <div class="row g-4" id="accountsContainer">

    </div>
</div>

<div class="modal fade" id="addAccountModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">

            <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                <h5 class="modal-title fw-bold text-dark-custom">Новый счет</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>

            <div class="modal-body p-4">
                <form id="addAccountForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Название</label>
                        <input type="text" id="newAccName" class="form-control bg-light border-0" placeholder="Например: Заначка" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Тип счета</label>
                        <select id="newAccType" class="form-select bg-light border-0">
                            <option>Дебетовая карта</option>
                            <option>Кредитная карта</option>
                            <option>Накопительный счет</option>
                            <option>Наличные</option>
                        </select>
                    </div>

                    <div class="row g-2 mb-4">
                        <div class="col-8">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Начальный баланс</label>
                            <input type="number" id="newAccBalance" class="form-control form-control-lg bg-light border-0" placeholder="0.00" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Валюта</label>
                            <select id="newAccCurr" class="form-select bg-light border-0">
                                <option>₽ RUB</option>
                                <option>$ USD</option>
                                <option>€ EUR</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 py-3 mb-3">
                        Сохранить счет
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="addTransactionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                <h5 class="modal-title fw-bold text-dark-custom">Новая транзакция</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body p-4">
                <form id="addTransactionForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Описание</label>
                        <input type="text" id="newTransDesc" class="form-control bg-light border-0" placeholder="Например: поход в вольчек" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Категория</label>
                            <input type="text" id="newTransCategory" list="categoryList" class="form-control bg-light border-0" placeholder="Выберите или введите..." autocomplete="off" required>
                            <datalist id="categoryList"></datalist>
                        </div>
                        <div class="col-6">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Дата</label>
                            <input type="date" id="newTransDate" class="form-control bg-light border-0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Счёт</label>
                        <select id="newTransAccount" class="form-select bg-light border-0" required>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Операция</label>
                        <select id="newTransType" class="form-select bg-light border-0" required>
                            <option value="expense">Расход</option>
                            <option value="income">Доход</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1 letter-spacing-1">Сумма (₽)</label>
                        <input type="number" id="newTransAmount" class="form-control form-control-lg bg-light border-0" placeholder="0.00" required>
                    </div>
                    <button type="submit" class="btn btn-custom w-100 py-3 rounded-pill fw-bold">
                        Сохранить транзакцию
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
    const userId = localStorage.getItem('mff_user_id');
    if (!userId) window.location.href = 'login.html';

    let allAccounts = [];

    async function loadAccounts() {
        try {
            const [accRes, transRes] = await Promise.all([
                fetch(`http://localhost:3000/accounts?userId=${userId}`),
                fetch(`http://localhost:3000/transactions?userId=${userId}`)
            ]);

            allAccounts = await accRes.json();
            const transactions = await transRes.json();

            const container = document.getElementById('accountsContainer');
            container.innerHTML = '';

            allAccounts.forEach((acc, index) => {
                const bgClass = 'acc-card-' + (index % 7);

                container.innerHTML += `
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm border-0 rounded-4 h-100 p-2 ${bgClass}">
                    <div class="card-body d-flex flex-column text-white">
                        <div class="d-flex justify-content-between align-items-start mb-4">
                            <span class="small fw-bold text-uppercase opacity-75">${acc.name}</span>
                            <span class="badge text-light rounded-pill">${acc.currency}</span>
                        </div>

                        <h2 class="fw-bolder mb-4 balance-amount" data-balance="${acc.balance} ${acc.currency}">
                            ${acc.balance.toLocaleString('ru-RU')} ${acc.currency}
                        </h2>

                        <div class="d-flex justify-content-between mt-auto">
                            <button onclick="openTransactionModal('${acc.id}')" class="btn btn-sm btn-outline-light rounded-circle fw-bold p-0 d-flex align-items-center justify-content-center shadow-sm btn-add-acc">
                                +
                            </button>
                            <a href="transact.html?accountId=${acc.id}" class="btn btn-sm btn-outline-light rounded-pill fw-bold px-3 d-flex align-items-center">
                                История
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            `;
            });

            const uniqueCategories = [...new Set(transactions.map(t => t.category))].filter(Boolean);
            const datalist = document.getElementById('categoryList');

            if (datalist) {
                datalist.innerHTML = '';
                uniqueCategories.forEach(cat => {
                    datalist.innerHTML += `<option value="${cat}">`;
                });
            }

        } catch (error) {
            console.error('Ошибка загрузки данных:', error);
        }
    }

    function openTransactionModal(accountId) {
        const select = document.getElementById('newTransAccount');
        select.innerHTML = '';

        allAccounts.forEach(acc => {
            const isSelected = acc.id === accountId ? 'selected' : '';
            select.innerHTML += `<option value="${acc.id}" ${isSelected}>${acc.name} (${acc.balance} ₽)</option>`;
        });

        document.getElementById('newTransDate').valueAsDate = new Date();

        const modal = new bootstrap.Modal(document.getElementById('addTransactionModal'));
        modal.show();
    }

    document.getElementById('addTransactionForm')?.addEventListener('submit', async function(e) {
        e.preventDefault();

        const desc = document.getElementById('newTransDesc').value;
        const category = document.getElementById('newTransCategory').value;
        const date = document.getElementById('newTransDate').value;
        const accountId = document.getElementById('newTransAccount').value;
        const type = document.getElementById('newTransType').value;
        const amount = Number(document.getElementById('newTransAmount').value);

        const selectedAccount = allAccounts.find(a => String(a.id) === String(accountId));
        const accCurrency = selectedAccount ? selectedAccount.currency : '₽';

        const newTx = {
            userId: Number(userId),
            accountId: accountId.match(/^[0-9]+$/) ? Number(accountId) : accountId,
            type: type,
            amount: amount,
            currency: accCurrency,
            category: category,
            description: desc,
            date: date
        };


        try {
            await fetch('http://localhost:3000/transactions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newTx)
            });

            const account = allAccounts.find(a => a.id === accountId);
            let newBalance = type === 'expense' ? account.balance - amount : account.balance + amount;

            await fetch(`http://localhost:3000/accounts/${accountId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ balance: newBalance })
            });

            const modalEl = document.getElementById('addTransactionModal');
            bootstrap.Modal.getInstance(modalEl).hide();

            this.reset();
            loadAccounts();

        } catch (error) {
            console.error('Ошибка:', error);
            alert('Ошибка при сохранении транзакции.');
        }
    });

    document.getElementById('addAccountForm')?.addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = document.getElementById('newAccName').value;
        const balance = Number(document.getElementById('newAccBalance').value);
        const currency = document.getElementById('newAccCurr').value.split(' ')[0];

        const newAccount = {
            userId: Number(userId),
            name: name,
            balance: balance,
            currency: currency,
        };

        try {
            const res = await fetch('http://localhost:3000/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newAccount)
            });

            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addAccountModal')).hide();
                this.reset();
                loadAccounts();
            }
        } catch (error) {
            console.error('Ошибка:', error);
        }
    });

    loadAccounts();
</script>
</html>
