<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - MFF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="main.css">
    <style>
        body { background-color: #f4f6f9; }
    </style>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary vh-100">

<main class="form-signin w-100 m-auto" style="max-width: 400px;">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="text-center mb-2 text-custom">
                <img style="transform: translateY(-4px);"  src="imgs/1.png" alt="Логотип MFF" width="35">
                <span class="fs-3 fw-bolder" >MFF</span>
                <img style="transform: translateY(-4px);" src="imgs/2.png" alt="Логотип MFF" width="35">
            </h2>
            <h4 class="text-center mb-3 text-custom">Finance assistance</h4>
            <h5 class="text-center mb-3">Регистрация аккаунта</h5>
            <form id="regForm" action="dash.html">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="floatingName" placeholder="Иван Иванов" required>
                    <label for="floatingName">Ваше имя</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                    <label for="floatingEmail">Email адрес</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                    <label for="floatingPassword">Пароль</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="floatingPasswordConfirm" placeholder="Password Confirm" required>
                    <label for="floatingPasswordConfirm">Повторите пароль</label>
                </div>

                <button class="btn btn-custom w-100 py-2 mb-3" type="submit">Создать аккаунт</button>

                <div class="text-center text-custom">
                    <span class="text-muted">Уже есть аккаунт?</span>
                    <a href="login.html" class="text-decoration-none text-custom fw-bold">Войти</a>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
<script>
    document.getElementById('regForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = document.getElementById('floatingName').value;
        const email = document.getElementById('floatingEmail').value;
        const password = document.getElementById('floatingPassword').value;
        const confPassword = document.getElementById('floatingPasswordConfirm').value;

        if (password !== confPassword) {
            alert('Пароли не совпадают!');
            return;
        }

        if (length(password) < 8) {
            alert('Пароль должен содержать 8 символов, хотя бы одну букву и цифру')
        }

        const hasLetter = /[a-zA-Zа-яА-Я]/.test(password);
        const hasNumber = /[0-9]/.test(password);

        if (!hasLetter || !hasNumber) {
            alert('Ошибка: Пароль должен содержать как минимум одну букву и одну цифру!');
            return;
        }

        const checkRes = await fetch(`http://localhost:3000/users?email=${email}`);
        const existingUsers = await checkRes.json();

        if (existingUsers.length > 0) {
            alert('Пользователь с таким email уже существует!');
            return;
        }

        const newUser = { name, email, password };

        const res = await fetch('http://localhost:3000/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newUser)
        });

        if (res.ok) {
            alert('Регистрация успешна! Теперь войдите в систему.');
            window.location.href = 'login.html';
        }
    });
</script>
</html>
