<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - MFF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="login.css">
    <style>
        body { background-color: #f4f6f9; }
    </style>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary vh-100">

<main class="form-signin w-100 m-auto" style="max-width: 400px;">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="text-center mb-4 text-custom">Mazafaka Finance (MFF)</h2>
            <h5 class="text-center mb-3">Вход в систему</h5>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                <label for="floatingInput">Email адрес</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                <label for="floatingPassword">Пароль</label>
            </div>
            <button class="btn btn-custom w-100 py-2 mb-3" type="submit">Войти</button>
            <div class="text-center text-custom">
                <a href="#" class="text-decoration-none text-custom">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
