<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | PosiMax</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg custom-navbar py-3" aria-label="Главная навигация">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-white" href="index.html" aria-label="На главную PosiMax">
                Posi<span class="neon-text">Max</span>
            </a>
            
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Открыть меню навигации">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" href="index.html" aria-current="page">Каталог</a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                    <button id="themeToggleBtn" class="btn btn-outline-secondary rounded-circle p-1 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px; font-size: 18px;" aria-label="Сменить тему">☀️</button>
                    
                    <div id="authBlock" class="d-flex flex-column flex-lg-row gap-2">
                        <a href="login.html" class="btn btn-outline-light rounded-pill px-4 fw-bold">Войти</a>
                        <a href="register.html" class="btn btn-neon rounded-pill px-4 fw-bold">Регистрация</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="auth-card p-4 p-md-5">
                    <h2 class="text-white fw-bold mb-4 text-center">С возвращением!</h2>
                    
                    <form id="loginForm" aria-label="Форма авторизации">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label text-white-50">Email</label>
                            <input type="email" id="loginEmail" name="email" class="form-control bg-dark text-white border-secondary px-3 py-2" placeholder="skibidi@email.com" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="loginPassword" class="form-label text-white-50">Пароль</label>
                            <input type="password" id="loginPassword" name="password" class="form-control bg-dark text-white border-secondary px-3 py-2" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-neon w-100 rounded-pill py-2 fw-bold">Войти в систему</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-white-50 mb-0">Нет аккаунта? <a href="register.html" class="text-neon fw-bold">Создать</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
