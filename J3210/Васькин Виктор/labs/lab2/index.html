<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PosiMax | Каталог курсов</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg custom-navbar py-3" aria-label="Главная навигация">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-white" href="index.html" aria-label="На главную PosiMax">
                Posi<span class="neon-text">Max</span>
            </a>
            
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Открыть меню навигации">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" href="index.html" aria-current="page">Каталог</a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                    <button id="themeToggleBtn" class="btn btn-outline-secondary rounded-circle p-1 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;" aria-label="Сменить тему">
                        <svg width="20" height="20">
                            <use id="themeIconUse" href="img/sprite.svg#sun"></use>
                        </svg>
                    </button>
                    <div id="authBlock" class="d-flex flex-column flex-lg-row gap-2">
                        <a href="login.html" class="btn btn-outline-light rounded-pill px-4 fw-bold">Войти</a>
                        <a href="register.html" class="btn btn-neon rounded-pill px-4 fw-bold">Регистрация</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-3 mb-5">
        <h1 class="text-white fw-bold mb-4">Каталог курсов</h1>

        <div class="filter-top-bar p-3 p-md-4 rounded-4 mb-4">
            <form class="row g-3 align-items-end" aria-label="Фильтрация курсов">
                <div class="col-12 col-lg-3">
                    <label for="searchInput" class="form-label text-white-50 small mb-1">Поиск</label>
                    <input type="text" id="searchInput" class="form-control bg-dark text-white border-secondary" placeholder="Название курса...">
                </div>

                <div class="col-12 col-md-4 col-lg-2">
                    <label for="categorySelect" class="form-label text-white-50 small mb-1">Направление</label>
                    <select id="categorySelect" class="form-select bg-dark text-white border-secondary">
                        <option value="all">Все</option>
                        <option value="lang">Языки</option>
                        <option value="data">Данные/ML</option>
                        <option value="math">Математика</option>
                    </select>
                </div>

                <div class="col-12 col-md-4 col-lg-2">
                    <label for="levelSelect" class="form-label text-white-50 small mb-1">Уровень</label>
                    <select id="levelSelect" class="form-select bg-dark text-white border-secondary">
                        <option value="all">Любой</option>
                        <option value="beginner">Новичок</option>
                        <option value="pro">Pro</option>
                    </select>
                </div>

                <div class="col-12 col-md-4 col-lg-3">
                    <label for="priceRange" class="form-label text-white-50 small mb-1 d-flex justify-content-between">
                        <span>Цена до:</span>
                        <span class="text-white fw-bold" id="priceLabel" aria-live="polite">10 000 ₽</span>
                    </label>
                    <input type="range" id="priceRange" class="form-range custom-range" min="0" max="10000" step="500" value="10000">
                </div>

                <div class="col-12 col-lg-2 d-flex gap-2">
                    <button type="button" id="resetFiltersBtn" class="btn btn-outline-light w-50 fw-bold" aria-label="Сбросить фильтры">Сброс</button>
                    <button type="button" id="applyFiltersBtn" class="btn btn-neon w-50 fw-bold" aria-label="Применить фильтры">Найти</button>
                </div>
            </form>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-4 g-4" id="coursesGrid">


        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
