<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | PosiMax</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar py-3" aria-label="Главная навигация">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-white" href="index.html" aria-label="На главную PosiMax">
                Posi<span class="neon-text">Max</span>
            </a>
            
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Открыть меню навигации">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" href="index.html" aria-current="page">Каталог</a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                    <button id="themeToggleBtn" class="btn btn-outline-secondary rounded-circle p-1 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px; font-size: 18px;" aria-label="Сменить тему">☀️</button>
                    
                    <div id="authBlock" class="d-flex flex-column flex-lg-row gap-2">
                        <a href="login.html" class="btn btn-outline-light rounded-pill px-4 fw-bold">Войти</a>
                        <a href="register.html" class="btn btn-neon rounded-pill px-4 fw-bold">Регистрация</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-3 mb-5">
        <div class="card bg-dark border-secondary rounded-4 p-4 mb-5">
            <div class="d-flex flex-column flex-md-row align-items-center justify-content-between">
                <div class="d-flex align-items-center mb-3 mb-md-0">
                    <img src="" id="profileAvatar" class="rounded-circle border border-3 border-secondary" width="128" height="128" alt="Аватар" style="object-fit: cover;">
                    <div class="ms-4">
                        <h2 class="text-white fw-bold mb-1" id="profileName">Загрузка...</h2>
                        <div class="text-white-50 mb-2" id="profileEmail">...</div>
                        <span class="badge bg-neon rounded-pill px-3 py-2" id="profileRoleBadge">...</span>
                    </div>
                </div>
                <div class="d-flex gap-4 text-center">
                    <div>
                        <div class="fs-3 fw-bold text-white" id="stat1">0</div>
                        <div class="text-white-50 small" id="statLabel1">Курсов</div>
                    </div>
                    <div>
                        <div class="fs-3 fw-bold text-white" id="stat2">0</div>
                        <div class="text-white-50 small" id="statLabel2">Сертификатов</div>
                    </div>
                    <div>
                        <div class="fs-3 fw-bold neon-text" id="stat3">0.0</div>
                        <div class="text-white-50 small">Рейтинг</div>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs custom-tabs border-secondary mb-4" id="profileTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active bg-transparent fw-bold" data-bs-toggle="tab" data-bs-target="#student-panel" type="button" role="tab">🎓 Мое обучение</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link bg-transparent fw-bold" data-bs-toggle="tab" data-bs-target="#teacher-panel" type="button" role="tab">👨‍🏫 Преподавание</button>
            </li>
        </ul>

        <div class="tab-content" id="profileTabsContent">
            <div class="tab-pane fade show active" id="student-panel" role="tabpanel">
                <h4 class="text-white mb-4">Текущие курсы</h4>
                <div class="row g-4" id="studentCoursesList">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-neon" role="status"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="teacher-panel" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="text-white mb-0">Мои авторские курсы</h4>
                    <button type="button" class="btn btn-neon rounded-pill px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#createCourseModal">
                        + Создать курс
                    </button>
                </div>

                <div class="table-responsive mt-3">
                    <table class="table table-dark table-hover border-secondary align-middle">
                        <thead>
                            <tr>
                                <th scope="col" class="text-white-50">Название</th>
                                <th scope="col" class="text-white-50">Цена</th>
                                <th scope="col" class="text-white-50">Рейтинг</th>
                                <th scope="col" class="text-white-50 text-end">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="teacherCoursesTable">
                            <tr><td colspan="4" class="text-center text-white-50 py-4">Загрузка курсов...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="createCourseModal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary rounded-4">
                
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white fw-bold">Новый курс</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                
                <div class="modal-body">
                    <form id="createCourseForm" aria-label="Форма создания курса">
                        <div class="mb-3">
                            <label for="ccTitle" class="form-label text-white-50">Название курса</label>
                            <input type="text" id="ccTitle" class="form-control bg-dark text-white border-secondary" placeholder="Например: Основы дизайна" required>
                        </div>
                        <div class="mb-3">
                            <label for="ccDesc" class="form-label text-white-50">Описание</label>
                            <textarea id="ccDesc" class="form-control bg-dark text-white border-secondary" rows="3" placeholder="Кратко о чем курс..." required></textarea>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label for="ccPrice" class="form-label text-white-50">Цена (₽)</label>
                                <input type="number" id="ccPrice" class="form-control bg-dark text-white border-secondary" placeholder="0 = Бесплатно">
                            </div>
                            <div class="col-6">
                                <label for="ccImage" class="form-label text-white-50">Обложка</label>
                                <input type="file" id="ccImage" class="form-control bg-dark text-white border-secondary" accept="image/*">
                            </div>
                        </div>
                    </form>
                </div>
                
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light rounded-pill px-4" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" form="createCourseForm" class="btn btn-neon rounded-pill px-4 fw-bold">Опубликовать</button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
