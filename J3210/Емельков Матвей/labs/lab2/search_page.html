<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эксперименты | MLPipelines</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-layout">

        <aside class="sidebar">
            <div class="sidebar__logo">MLPipelines</div>

            <div class="sidebar__scroll-wrapper">

                <nav class="sidebar__nav">
                    <nav class="sidebar__nav">
                        <a href="index.html" class="sidebar__link">
                            Личный кабинет
                        </a>
                        <a href="search_page.html" class="sidebar__link sidebar__link--active">
                            Эксперименты
                        </a>
                        <a href="models.html" class="sidebar__link">
                            Модели
                        </a>
                    </nav>
                </nav>

                <footer class="sidebar__footer dropdown">
                    <a href="#" class="sidebar__link dropdown-toggle text-decoration-none text-truncate" id="userNameDisplay" data-bs-toggle="dropdown" aria-expanded="false">
                        Иван Иванов
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="userName">
                        <li>
                            <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#settingsModal">
                                Настройки
                            </a>
                        </li>
                        <li><a class="dropdown-item text-danger" href="login.html">Выйти</a></li>
                    </ul>
                </footer>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-content__header">
                <h1>Эксперименты</h1>
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newExperimentModal">
                    Новый эксперимент
                </button>
            </header>

            <section class="content-panel">
                <form class="row g-3 align-items-end">

                    <div class="col-md-4">
                        <label for="searchInput" class="form-label text-muted small">Поиск по названию</label>
                        <input type="text" class="form-control" id="searchInput" placeholder="Например, ResNet или CV">
                    </div>

                    <div class="col-md-3">
                        <label for="dateFilter" class="form-label text-muted small">Дата создания</label>
                        <input type="date" class="form-control" id="dateFilter">
                    </div>

                    <div class="col-md-3">
                        <label for="metricFilter" class="form-label text-muted small">Сортировка по метрике</label>
                        <select id="metricFilter" class="form-select">
                            <option selected>Выбрать</option>
                            <option value="1">Accuracy (по убыванию)</option>
                            <option value="2">Loss (по возрастанию)</option>
                            <option value="3">F1-Score (по убыванию)</option>
                            <option value="4">Perplexity (по убыванию)</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button type="submit" class="btn btn-outline-primary w-100">Применить</button>
                    </div>

                </form>
            </section>

            <section class="content-panel">

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Название</th>
                                <th>Модель</th>
                                <th>Метрика</th>
                                <th>Значение метрики</th>
                                <th>Дата</th>
                                <th>Длительность</th>
                                <th>Статус</th>
                                <th></th>
                            </tr>
                        </thead>

                        <tbody id="searchTableBody"></tbody>

                    </table>
                </div>
            </section>
        </main>
    </div>
    <div class="modal fade" id="newExperimentModal" tabindex="-1" aria-labelledby="newExperimentModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title" id="newExperimentModelLabel">Создать новый эксперимент</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>

                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="newExpName" class="form-label">Название эксперимента</label>
                            <input type="text" class="form-control" id="newExpName" placeholder="Experiment_N">
                        </div>

                        <div class="mb-3">
                            <label for="newExpModel" class="form-label">Модель</label>
                            <input type="text" class="form-control" id="newExpModel" placeholder="Например: ResNet_18">
                        </div>

                        <footer class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                Отмена
                            </button>
                            <button type="button" id="btnSaveExperiment" class="btn btn-primary" data-bs-dismiss="modal">
                                Создать
                            </button>
                        </footer>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Настройки профиля</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Внешний вид</label>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="darkModeSwitch" role="switch">
                                <label class="form-check-label" for="darkModeSwitch">Темная тема</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="interfaceLanguage" class="form-label fw-bold">Язык интерфейса</label>
                            <select id="interfaceLanguage" class="form-select">
                                <option selected>Русский</option>
                                <option>English</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/application.js"></script>
</body>
</html>
