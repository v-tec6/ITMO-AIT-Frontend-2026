<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | MLPipelines</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container d-flex justify-content-center align-items-center vh-100">

        <section class="auth-card">
            <header class="auth-card__header">
                <h1 class="auth-card__title">MLPipelines</h1>
                <p class="auth-card__subtitle">Вход в систему</p>
            </header>

            <form action="index.html">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="name@yandex.ru" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="********" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>

            <footer class="mt-4 text-center">
                <span class="text-muted">Нет аккаунта?</span>
                <a href="register.html" class="text-decoration-none">Зарегистрироваться</a>
            </footer>
        </section>

    </main>

</body>
</html>
