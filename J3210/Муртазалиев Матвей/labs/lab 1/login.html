<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinFlow — Вход</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="login">
    <header class="site-header">
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand brand-mark" href="./index.html">FinFlow</a>
          <button
            class="navbar-toggler border-0 shadow-none"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNav"
            aria-controls="mainNav"
            aria-expanded="false"
            aria-label="Переключить навигацию"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav mx-auto gap-lg-2">
              <li class="nav-item"><a class="nav-link" href="./index.html">Главная</a></li>
              <li class="nav-item"><a class="nav-link active" href="./login.html">Вход</a></li>
              <li class="nav-item"><a class="nav-link" href="./register.html">Регистрация</a></li>
              <li class="nav-item"><a class="nav-link" href="./dashboard.html">Кабинет</a></li>
              <li class="nav-item"><a class="nav-link" href="./reports.html">Отчёты</a></li>
              <li class="nav-item"><a class="nav-link" href="./integrations.html">Интеграции</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="auth-page">
      <div class="container">
        <div class="auth-shell auth-shell--single">
          <div class="auth-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div>
                <span class="section-label">Авторизация</span>
                <h2 class="h3 mb-0 mt-2">Войти</h2>
              </div>
              <a class="text-decoration-none small fw-semibold" href="./register.html">Создать аккаунт</a>
            </div>
            <form class="row g-3 auth-form" data-auth-form>
              <div class="col-12">
                <label class="form-label" for="loginEmail">Email</label>
                <input class="form-control form-control-lg" id="loginEmail" type="email" placeholder="demo@finflow.ru" />
              </div>
              <div class="col-12">
                <label class="form-label" for="loginPassword">Пароль</label>
                <div class="input-group input-group-lg">
                  <input
                    class="form-control"
                    id="loginPassword"
                    type="password"
                    placeholder="Введите пароль"
                    data-password-input
                  />
                  <button class="btn btn-outline-secondary" type="button" data-password-toggle>
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>
              <div class="col-12 d-flex justify-content-between align-items-center">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="rememberMe" checked />
                  <label class="form-check-label" for="rememberMe">Запомнить меня</label>
                </div>
                <button
                  class="btn btn-link p-0 text-decoration-none"
                  type="button"
                  data-bs-toggle="modal"
                  data-bs-target="#resetModal"
                >
                  Забыли пароль?
                </button>
              </div>
              <div class="col-12">
                <a class="btn btn-accent btn-lg w-100" href="./dashboard.html">Войти в кабинет</a>
              </div>
              <div class="col-12">
                <div class="divider-text"><span>или продолжить через</span></div>
              </div>
              <div class="col-sm-6">
                <button class="btn btn-outline-dark w-100" type="button">
                  <i class="bi bi-google me-2"></i>Google
                </button>
              </div>
              <div class="col-sm-6">
                <button class="btn btn-outline-dark w-100" type="button">
                  <i class="bi bi-apple me-2"></i>Apple ID
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="resetModal" tabindex="-1" aria-labelledby="resetLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-header border-0">
            <h2 class="h4 mb-0" id="resetLabel">Восстановление доступа</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
          </div>
          <div class="modal-body">
            <p class="text-secondary">
              Ссылка для сброса пароля будет отправлена на email, привязанный к аккаунту.
            </p>
            <label class="form-label" for="resetEmail">Email</label>
            <input class="form-control" id="resetEmail" type="email" placeholder="name@example.com" />
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-accent w-100" data-bs-dismiss="modal">Отправить ссылку</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/script.js"></script>
  </body>
</html>
