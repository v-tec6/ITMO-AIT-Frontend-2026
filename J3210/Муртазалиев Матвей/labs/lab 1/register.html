<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinFlow — Регистрация</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="register">
    <header class="site-header">
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand brand-mark" href="./index.html">FinFlow</a>
          <button
            class="navbar-toggler border-0 shadow-none"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNav"
            aria-controls="mainNav"
            aria-expanded="false"
            aria-label="Переключить навигацию"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav mx-auto gap-lg-2">
              <li class="nav-item"><a class="nav-link" href="./index.html">Главная</a></li>
              <li class="nav-item"><a class="nav-link" href="./login.html">Вход</a></li>
              <li class="nav-item"><a class="nav-link active" href="./register.html">Регистрация</a></li>
              <li class="nav-item"><a class="nav-link" href="./dashboard.html">Кабинет</a></li>
              <li class="nav-item"><a class="nav-link" href="./reports.html">Отчёты</a></li>
              <li class="nav-item"><a class="nav-link" href="./integrations.html">Интеграции</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="auth-page">
      <div class="container">
        <div class="auth-shell auth-shell--single">
          <div class="auth-panel">
            <span class="section-label">Регистрация</span>
            <h1 class="section-title mt-3">Создать аккаунт</h1>
            <form class="row g-3 mt-1" data-register-form>
              <div class="col-md-6">
                <label class="form-label" for="firstName">Имя</label>
                <input class="form-control form-control-lg" id="firstName" type="text" placeholder="Матвей" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="lastName">Фамилия</label>
                <input class="form-control form-control-lg" id="lastName" type="text" placeholder="Муртазалиев" />
              </div>
              <div class="col-12">
                <label class="form-label" for="registerEmail">Email</label>
                <input class="form-control form-control-lg" id="registerEmail" type="email" placeholder="you@example.com" />
              </div>
              <div class="col-12">
                <label class="form-label" for="registerPassword">Пароль</label>
                <input
                  class="form-control form-control-lg"
                  id="registerPassword"
                  type="password"
                  placeholder="Не менее 8 символов"
                  data-strength-input
                />
                <div class="password-strength mt-3">
                  <div class="password-strength__bar"><span data-strength-bar></span></div>
                  <small class="text-secondary" data-strength-text>Укажите пароль</small>
                </div>
              </div>
              <div class="col-12">
                <label class="form-label">Тариф</label>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="plan-card">
                      <input type="radio" name="plan" checked />
                      <span class="plan-card__title">Starter</span>
                      <span class="plan-card__price">Бесплатно</span>
                      <span class="plan-card__copy">1 банк, ручное ведение бюджета</span>
                    </label>
                  </div>
                  <div class="col-md-6">
                    <label class="plan-card">
                      <input type="radio" name="plan" />
                      <span class="plan-card__title">Pro</span>
                      <span class="plan-card__price">₽ 399 / месяц</span>
                      <span class="plan-card__copy">Прогнозы, отчёты и автоправила</span>
                    </label>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="agreeTerms" checked />
                  <label class="form-check-label" for="agreeTerms">
                    Я согласен с условиями обработки данных и пользовательским соглашением
                  </label>
                </div>
              </div>
              <div class="col-12">
                <a class="btn btn-accent btn-lg w-100" href="./dashboard.html">Зарегистрироваться</a>
              </div>
              <div class="col-12">
                <div class="alert alert-light border mb-0">
                  Уже зарегистрированы?
                  <a class="fw-semibold text-decoration-none" href="./login.html">Перейти ко входу</a>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/script.js"></script>
  </body>
</html>
