<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | EduPlatform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="bg-light auth-page">

    <!-- Навбар -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container justify-content-center justify-content-md-between">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-mortarboard-fill text-warning me-2"></i>EduPlatform
            </a>
            <a href="index.html" class="btn btn-sm btn-outline-light d-none d-md-block">
                <i class="bi bi-arrow-left"></i> На главную
            </a>
        </div>
    </nav>

    <!-- Контейнер с формой -->
    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="card shadow-lg auth-card border-0">
            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h2 class="fw-bold">Создать аккаунт</h2>
                    <p class="text-muted">Присоединяйтесь к тысячам студентов</p>
                </div>

                <form id="registerForm" novalidate>

                    <!-- Имя и фамилия пользователя -->
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="regFirstName" placeholder="Иван" required>
                                <label for="regFirstName">Имя</label>
                                <div class="invalid-feedback">Введите имя.</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="regLastName" placeholder="Иванов" required>
                                <label for="regLastName">Фамилия</label>
                                <div class="invalid-feedback">Введите фамилию.</div>
                            </div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required>
                        <label for="regEmail">Email адрес</label>
                        <div class="invalid-feedback">Ввердите корректный email</div>
                    </div>

                    <!-- Пароль -->
                     <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="regPassword" placeholder="Пароль" required minlength="6">
                        <label for="regPassword">Пароль (минимум 6 символов)</label>
                        <div class="invalid-feedback">Пароль должен быть не короче 6 символов.</div>
                    </div>

                    <!-- Повтор пароля -->
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="regPasswordConfirm" placeholder="Повторите пароль" required>
                        <label for="regPasswordConfirm">Повторите пароль</label>
                        <div class="invalid-feedback" id="passwordMatchError">Пароли не совпадают!</div>
                    </div>

                    <!-- Чекбокс согласия -->
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="termsCheck" required>
                        <label class="form-check-label text-muted small" for="termsCheck">
                            Я согласен с <a href="#">условиями использования</a> платформы
                        </label>
                    </div>

                    <!-- Кнопка отправки -->
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" id="registerBtn">
                        Зарегестрироваться
                    </button>

                </form>

                <div class="text-center mt-4">
                    <p class="mb-0 text-muted">Уже есть аккаунт? <a href="#" class="text-decoration-none fw-bold">Войти</a></p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
