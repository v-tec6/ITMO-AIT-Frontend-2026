<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | EduPlatform</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <!-- Навбар -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container justify-content-center justify-content-md-between">
            <a class="navbar-brand fw-bold" href="index.html">
                <svg class="icon text-warning me-2"><use href="img/sprite.svg#mortarboard-fill"></use></svg>EduPlatform
            </a>
            <div class="d-flex gap-2 align-items-center">
                <a href="index.html" class="btn btn-sm btn-outline-light d-none d-md-block">
                    <i class="bi bi-arrow-left"></i> На главную
                </a>
                <button class="btn btn-outline-light btn-sm ms-3" id="themeToggleBtn" aria-label="Переключить тему">
                    <svg class="icon" aria-hidden="true">
                        <use id="themeIconUse" href="img/sprite.svg#moon-stars-fill"></use>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Контейнер с формой -->
    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="card shadow-lg auth-card border-0">
            <div class="card-body p-5">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold">С возвращением!</h2>
                    <p class="text-muted">Войдите, чтобы продолжить обучение</p>
                </div>

                <!-- Форма входа -->
                <form id="loginForm" novalidate>
                    
                    <!-- Email -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required aria-describedby="emailError">
                        <label for="loginEmail">Email адрес</label>
                        <div class="invalid-feedback" id="emailError" aria-live="assertive">Пожалуйста, введите корректный email.</div>
                    </div>

                    <!-- Пароль -->
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="loginPassword" placeholder="Пароль" required aria-describedby="passwordError">
                        <label for="loginPassword">Пароль</label>
                        <div class="invalid-feedback" id="passwordError" aria-live="assertive">Введите пароль.</div>
                    </div>

                    <!-- Чекбокс "Запомнить меня" и ссылка "Забыли пароль" -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted small" for="rememberMe">
                                Запомнить меня
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none small fw-bold">Забыли пароль?</a>
                    </div>

                    <!-- Кнопка отправки -->
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" id="loginBtn">
                        Войти
                    </button>

                </form>

                <div class="text-center mt-4">
                    <p class="mb-0 text-muted">Нет аккаунта? <a href="register.html" class="text-decoration-none fw-bold">Зарегистрироваться</a></p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
