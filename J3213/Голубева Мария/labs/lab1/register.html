<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Регистрация - SpeakEasy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light">
<div class="container">

<a class="navbar-brand" href="index.html">SpeakEasy</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Главная</a>
</li>

<li class="nav-item">
<a class="nav-link" href="courses.html">Курсы</a>
</li>

<li class="nav-item">
<a class="nav-link" href="login.html">Вход</a>
</li>

</ul>

</div>
</nav>

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card p-4">

<div class="text-center mb-4">

<div class="badge-box">Создайте аккаунт</div>

<h2>Регистрация</h2>

<p class="text-muted">
Заполните форму для создания аккаунта
</p>

</div>

<form id="registerForm">

<div class="mb-3">
<label class="form-label">Имя</label>
<input type="text" class="form-control" id="regName" placeholder="Введите имя">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="regEmail" placeholder="Введите email">
</div>

<div class="mb-3">
<label class="form-label">Пароль</label>
<input type="password" class="form-control" id="regPassword" placeholder="Введите пароль">
</div>

<div class="mb-3">
<label class="form-label">Повторите пароль</label>
<input type="password" class="form-control" id="regPassword2" placeholder="Повторите пароль">
</div>

<div class="text-danger mt-2" id="registerError"></div>

<div class="d-grid">
<button type="submit" class="btn btn-primary">
Зарегистрироваться
</button>
</div>

</form>

<div class="text-center mt-4">

<p class="mb-1">Уже есть аккаунт?</p>

<a href="login.html" class="btn btn-outline-primary">
Войти
</a>

</div>

</div>

</div>
</div>
</div>

<footer class="text-center mt-5">
<p>© 2026 SpeakEasy</p>
</footer>

<script src="js/script.js"></script>

</body>

</html>
